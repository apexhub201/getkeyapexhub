<!DOCTYPE html>
<html lang="vi">
<head>

    <meta http-equiv="Content-Security-Policy" content="

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .bg-aurora {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(76, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 255, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 80%, rgba(180, 100, 255, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 100, 200, 0.04) 0%, transparent 40%);
            animation: auroraMove 15s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes auroraMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, -1%) rotate(1deg); }
            50% { transform: translate(-1%, 1%) rotate(-1deg); }
            75% { transform: translate(-2%, -0.5%) rotate(0.5deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.4), rgba(0, 180, 255, 0.3));
            border-radius: 50%;
            animation: floatParticle 20s infinite;
        }

        @keyframes floatParticle {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1); 
                opacity: 0.2; 
            }
            10% { 
                transform: translateY(-100px) translateX(30px) scale(1.8); 
                opacity: 0.6; 
            }
            25% { 
                transform: translateY(-200px) translateX(-50px) scale(0.8); 
                opacity: 0.1; 
            }
            40% { 
                transform: translateY(-150px) translateX(70px) scale(1.5); 
                opacity: 0.5; 
            }
            60% { 
                transform: translateY(-300px) translateX(-80px) scale(0.6); 
                opacity: 0.3; 
            }
            80% { 
                transform: translateY(-100px) translateX(20px) scale(1.3); 
                opacity: 0.7; 
            }
        }

        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 550px;
        }

        .card-wrapper {
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .card {
            background: rgba(15, 15, 30, 0.8);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 1px 0 rgba(255, 255, 255, 0.08) inset,
                0 0 100px rgba(100, 50, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: cardGlow 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .card.loading-card {
            pointer-events: none;
        }

        @keyframes cardGlow {
            0%, 100% { 
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 100px rgba(100, 50, 255, 0.1);
            }
            50% { 
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 150px rgba(100, 50, 255, 0.2);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(120, 80, 255, 0.1) 25%, 
                rgba(0, 180, 255, 0.1) 50%, 
                rgba(180, 100, 255, 0.1) 75%, 
                transparent 100%);
            border-radius: 33px;
            z-index: -2;
            animation: borderRotate 8s linear infinite;
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .brand-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, 
                #b894f7 0%, 
                #7eb8ff 25%, 
                #c4a6ff 50%, 
                #9d7bff 75%, 
                #b894f7 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: brandShine 4s linear infinite;
            filter: drop-shadow(0 0 40px rgba(140, 100, 255, 0.6));
        }

        @keyframes brandShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(180, 150, 255, 0.8), 
                transparent);
            margin: 15px auto;
            animation: dividerPulse 2s ease-in-out infinite;
        }

        @keyframes dividerPulse {
            0%, 100% { opacity: 0.5; width: 60px; }
            50% { opacity: 1; width: 100px; }
        }

        .subtitle {
            color: rgba(200, 200, 230, 0.6);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: subtitleFade 3s ease-in-out infinite;
        }

        @keyframes subtitleFade {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .key-area {
            background: rgba(10, 10, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 25px;
            margin: 30px 0;
            text-align: center;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .key-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(160, 140, 255, 0.5), 
                transparent);
            animation: scanLine 4s ease-in-out infinite;
        }

        @keyframes scanLine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .key-label {
            color: rgba(180, 170, 210, 0.7);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .key-value {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 1.1rem;
            color: #e8dfff;
            background: rgba(0, 0, 0, 0.4);
            padding: 18px 20px;
            border-radius: 12px;
            border: 1px solid rgba(160, 140, 220, 0.3);
            word-break: break-all;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key-value:hover {
            border-color: rgba(180, 160, 240, 0.6);
            box-shadow: 0 0 30px rgba(120, 80, 255, 0.2);
            transform: scale(1.02);
        }

        .key-value.loading-key {
            opacity: 0.5;
            animation: loadingPulse 1.5s ease-in-out infinite;
            cursor: default;
        }

        .key-value.loading-key:hover {
            transform: none;
            box-shadow: none;
            border-color: rgba(160, 140, 220, 0.3);
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
            color: #b8a9e0;
            font-size: 0.9rem;
        }

        .timer {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #f0c27b, #f8a55a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: timerPulse 1s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .btn {
            width: 100%;
            padding: 18px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            background: linear-gradient(135deg, 
                rgba(50, 25, 80, 0.9), 
                rgba(30, 20, 60, 0.9));
            color: #e0d0ff;
            border: 1px solid rgba(200, 170, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            animation: btnFloat 3s ease-in-out infinite;
        }

        @keyframes btnFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, 
                rgba(255, 255, 255, 0.1) 0%, 
                transparent 60%);
            animation: btnRipple 3s infinite;
        }

        @keyframes btnRipple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(200, 170, 255, 0.6);
            box-shadow: 
                0 20px 40px rgba(100, 50, 200, 0.4),
                0 0 80px rgba(120, 80, 255, 0.3);
            animation: none;
        }

        .btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
            transition: all 0.1s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
            filter: grayscale(30%);
        }

        .status-message {
            color: #b8a0e0;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.8;
            animation: messageFade 2s ease-in-out infinite;
            min-height: 24px;
        }

        @keyframes messageFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .status-message.error {
            color: #ff6b6b;
            animation: none;
        }

        .status-message.success {
            color: #6bff9e;
            animation: none;
        }

        .copy-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(40, 20, 60, 0.95);
            color: #e0d0ff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 100;
            border: 1px solid rgba(200, 170, 255, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .hidden {
            display: none !important;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid #b894f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
                border-radius: 24px;
            }
            .brand {
                font-size: 2.2rem;
            }
            .key-value {
                font-size: 0.9rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-aurora"></div>
    <div class="grid-lines"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card-wrapper">
            <div class="card" id="mainCard">
                <div class="brand-container">
                    <div class="brand">APEX HUB</div>

                </div>

                    <div class="key-value loading-key" id="keyDisplay" title="Click to copy">
                        <span class="spinner"></span> Loading...
                    </div>
                    <div class="timer-container hidden" id="timerContainer">
                        <span>⏱ Time Remaining</span>
                        <span class="timer" id="countdown">24:00:00</span>
                    </div>
                </div>

                <!-- Button Area -->
                <button class="btn hidden" id="getKeyBtn">🔑 GET KEY</button>
                <button class="btn hidden" id="newKeyBtn">🔄 GET NEW KEY</button>
                
                <!-- Status Message -->

            </div>
        </div>
    </div>

    <div class="copy-notification" id="copyNotification">✅ Key copied to clipboard!</div>

    <script>
        (function() {
            'use strict';

            // ========== CONFIGURATION ==========
            const CONFIG = {
                SHORTENER_URL: 'https://link4m.org/hPXljdW',
                SHORTENER_DOMAINS: ['link4m.org', 'link4m.net', 'link4m.com'],
                KEY_PREFIX: 'Free_',
                REQUIRED_WORD: 'apex',
                SPECIAL_CHARS: 'qptoeugjwmxnalkjf¡¿\'-:;₫&@9275023#%*^+€¥$_|\\[]{}bcz',
                KEY_DURATION: 24 * 60 * 60 * 1000,
                STORAGE_PREFIX: 'axph_',
                FINGERPRINT_KEY: 'axph_fp'
            };

            // ========== SECURITY SYSTEM ==========
            const SecuritySystem = {
                tamperDetected: false,
                
                init: function() {
                    this.detectDevTools();
                    this.protectConsole();
                    this.blockShortcuts();
                    this.preventContextMenu();
                },

                detectDevTools: function() {
                    setInterval(() => {
                        const threshold = 160;
                        const widthDiff = window.outerWidth - window.innerWidth > threshold;
                        const heightDiff = window.outerHeight - window.innerHeight > threshold;
                        
                        if ((widthDiff || heightDiff) && !this.tamperDetected) {
                            this.triggerAlert();
                        }
                    }, 1000);
                },

                protectConsole: function() {
                    const noop = () => {};
                    const methods = ['log', 'warn', 'info', 'debug', 'clear', 'table', 'trace'];
                    
                    methods.forEach(method => {
                        const original = console[method];
                        console[method] = function(...args) {
                            if (SecuritySystem.tamperDetected) return;
                            if (method === 'error' && args[0] && args[0].includes('[APEX]')) {
                                original.apply(console, args);
                            }
                        };
                    });
                },

                blockShortcuts: function() {
                    document.addEventListener('keydown', function(e) {
                        if (
                            (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key)) ||
                            (e.ctrlKey && e.key === 'U') ||
                            e.key === 'F12'
                        ) {
                            e.preventDefault();
                            e.stopPropagation();
                            return false;
                        }
                    }, true);
                },

                preventContextMenu: function() {
                    document.addEventListener('contextmenu', function(e) {
                        e.preventDefault();
                        return false;
                    }, true);
                },

                triggerAlert: function() {
                    this.tamperDetected = true;
                    StorageManager.clearAll();
                    
                    const keyDisplay = document.getElementById('keyDisplay');
                    if (keyDisplay) {
                        keyDisplay.textContent = '⚠️ SECURITY BREACH - PLEASE REFRESH';
                        keyDisplay.style.color = '#ff0000';
                        keyDisplay.style.cursor = 'not-allowed';
                    }
                    
                    UIManager.showStatus('Security breach detected! Data cleared.', 'error');
                },

                isSecure: function() {
                    return !this.tamperDetected;
                }
            };

            // ========== FINGERPRINT ==========
            function generateFingerprint() {
                const components = [
                    navigator.userAgent,
                    navigator.language,
                    screen.colorDepth,
                    screen.width + 'x' + screen.height,
                    new Date().getTimezoneOffset(),
                    navigator.hardwareConcurrency || 'unknown',
                    navigator.deviceMemory || 'unknown'
                ];
                
                let hash = 0;
                const str = components.join('||');
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                
                return Math.abs(hash).toString(36) + '_' + Date.now().toString(36);
            }

            function verifyFingerprint() {
                const stored = sessionStorage.getItem(CONFIG.FINGERPRINT_KEY);
                const current = generateFingerprint();
                
                if (!stored) {
                    sessionStorage.setItem(CONFIG.FINGERPRINT_KEY, current);
                    return true;
                }
                
                // So sánh phần hash (bỏ timestamp)
                const storedHash = stored.split('_')[0];
                const currentHash = current.split('_')[0];
                return storedHash === currentHash;
            }

            // ========== KEY GENERATOR ==========
            function generateKey() {
                let key = CONFIG.KEY_PREFIX;
                const randomBytes = new Uint8Array(16);
                crypto.getRandomValues(randomBytes);
                const randomStr = Array.from(randomBytes, b => b.toString(16).padStart(2, '0')).join('');
                
                const specialPart = CONFIG.SPECIAL_CHARS.substring(0, Math.floor(Math.random() * 20) + 10);
                const position = Math.floor(Math.random() * 3);
                
                switch(position) {
                    case 0:
                        key += CONFIG.REQUIRED_WORD + specialPart + randomStr;
                        break;
                    case 1:
                        const mid = Math.floor(specialPart.length / 2);
                        key += specialPart.substring(0, mid) + CONFIG.REQUIRED_WORD + specialPart.substring(mid) + randomStr;
                        break;
                    case 2:
                        key += specialPart + randomStr + CONFIG.REQUIRED_WORD;
                        break;
                }
                
                if (!/[¡¿'\-:;₫&@#%*^+€¥$_|\\\[\]{}]/.test(key)) {
                    key += CONFIG.SPECIAL_CHARS.substring(0, 8);
                }
                
                return key;
            }

            function validateKey(key) {
                if (!key || typeof key !== 'string') return false;
                if (!key.startsWith(CONFIG.KEY_PREFIX)) return false;
                if (!key.includes(CONFIG.REQUIRED_WORD)) return false;
                if (!/[¡¿'\-:;₫&@#%*^+€¥$_|\\\[\]{}]/.test(key)) return false;
                return key.length >= 35;
            }

            // ========== STORAGE MANAGER ==========
            const StorageManager = {
                saveKeyData: function(keyData) {
                    try {
                        const data = {
                            ...keyData,
                            fingerprint: generateFingerprint().split('_')[0],
                            savedAt: Date.now()
                        };
                        sessionStorage.setItem(CONFIG.STORAGE_PREFIX + 'kd', JSON.stringify(data));
                        return true;
                    } catch(e) {
                        return false;
                    }
                },

                loadKeyData: function() {
                    try {
                        const raw = sessionStorage.getItem(CONFIG.STORAGE_PREFIX + 'kd');
                        if (!raw) return null;
                        
                        const data = JSON.parse(raw);
                        
                        // Verify fingerprint
                        const currentFingerprint = generateFingerprint().split('_')[0];
                        if (data.fingerprint !== currentFingerprint) {
                            this.clearAll();
                            return null;
                        }
                        
                        // Check expiry
                        if (Date.now() - data.savedAt > CONFIG.KEY_DURATION) {
                            this.clearAll();
                            return null;
                        }
                        
                        return data;
                    } catch(e) {
                        this.clearAll();
                        return null;
                    }
                },

                clearAll: function() {
                    const keys = Object.keys(sessionStorage);
                    keys.forEach(key => {
                        if (key.startsWith(CONFIG.STORAGE_PREFIX) || key === CONFIG.FINGERPRINT_KEY) {
                            sessionStorage.removeItem(key);
                        }
                    });
                }
            };

            // ========== UI MANAGER ==========
            const UIManager = {
                elements: {
                    mainCard: document.getElementById('mainCard'),
                    keyDisplay: document.getElementById('keyDisplay'),
                    keyLabel: document.getElementById('keyLabel'),
                    countdown: document.getElementById('countdown'),
                    timerContainer: document.getElementById('timerContainer'),
                    getKeyBtn: document.getElementById('getKeyBtn'),
                    newKeyBtn: document.getElementById('newKeyBtn'),
                    statusMessage: document.getElementById('statusMessage'),
                    copyNotification: document.getElementById('copyNotification')
                },

                countdownInterval: null,
                currentExpiry: null,

                // Hiển thị key (từ shortener)
                showKey: function(key, expiry) {
                    // Bỏ loading
                    this.elements.keyDisplay.classList.remove('loading-key');
                    this.elements.keyDisplay.innerHTML = '';
                    this.elements.keyDisplay.textContent = key;
                    this.elements.keyDisplay.style.cursor = 'pointer';
                    
                    // Hiển thị timer
                    this.elements.timerContainer.classList.remove('hidden');
                    
                    // Ẩn tất cả button
                    this.elements.getKeyBtn.classList.add('hidden');
                    this.elements.newKeyBtn.classList.add('hidden');
                    
                    // Start countdown
                    this.startCountdown(expiry);
                    
                    // Update status
                    this.showStatus('✅ Key ready! Click to copy.', 'success');
                    
                    // Xóa URL params để bảo mật
                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                },

                // Hiển thị trạng thái chưa có key (cần GET KEY)
                showGetKeyButton: function() {
                    this.elements.keyDisplay.classList.remove('loading-key');
                    this.elements.keyDisplay.innerHTML = '-----';
                    this.elements.keyDisplay.style.opacity = '0.5';
                    this.elements.keyDisplay.style.cursor = 'default';
                    
                    this.elements.timerContainer.classList.add('hidden');
                    this.elements.getKeyBtn.classList.remove('hidden');
                    this.elements.newKeyBtn.classList.add('hidden');
                    
                    this.showStatus('Click GET KEY to receive your license', '');
                },

                // Hiển thị đang loading
                showLoading: function(message) {
                    this.elements.keyDisplay.classList.add('loading-key');
                    this.elements.keyDisplay.innerHTML = '<span class="spinner"></span> Loading...';
                    this.elements.keyDisplay.style.cursor = 'default';
                    
                    this.elements.timerContainer.classList.add('hidden');
                    this.elements.getKeyBtn.classList.add('hidden');
                    this.elements.newKeyBtn.classList.add('hidden');
                    
                    this.showStatus(message || 'Initializing...', '');
                },

                startCountdown: function(expiryTimestamp) {
                    this.stopCountdown();
                    this.currentExpiry = expiryTimestamp;

                    const update = () => {
                        const remaining = this.currentExpiry - Date.now();
                        
                        if (remaining <= 0) {
                            this.handleExpiry();
                            return;
                        }

                        const hours = Math.floor(remaining / 3600000);
                        const minutes = Math.floor((remaining % 3600000) / 60000);
                        const seconds = Math.floor((remaining % 60000) / 1000);
                        
                        this.elements.countdown.textContent = 
                            `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                    };

                    update();
                    this.countdownInterval = setInterval(update, 1000);
                },

                stopCountdown: function() {
                    if (this.countdownInterval) {
                        clearInterval(this.countdownInterval);
                        this.countdownInterval = null;
                    }
                    this.currentExpiry = null;
                },

                handleExpiry: function() {
                    this.stopCountdown();
                    
                    this.elements.keyDisplay.classList.remove('loading-key');
                    this.elements.keyDisplay.innerHTML = 'EXPIRED';
                    this.elements.keyDisplay.style.color = '#ff6b6b';
                    this.elements.keyDisplay.style.cursor = 'not-allowed';
                    
                    this.elements.timerContainer.classList.add('hidden');
                    this.elements.getKeyBtn.classList.add('hidden');
                    this.elements.newKeyBtn.classList.remove('hidden');
                    
                    this.showStatus('⏰ Key expired. Get a new one.', 'error');
                    
                    StorageManager.clearAll();
                },

                showStatus: function(message, type) {
                    const el = this.elements.statusMessage;
                    el.textContent = message;
                    el.className = 'status-message';
                    
                    if (type === 'error') el.classList.add('error');
                    if (type === 'success') el.classList.add('success');
                },

                showCopyNotification: function() {
                    const notif = this.elements.copyNotification;
                    notif.classList.add('show');
                    setTimeout(() => {
                        notif.classList.remove('show');
                    }, 2000);
                }
            };

            // ========== MAIN APPLICATION ==========
            const App = {
                init: function() {
                    // Khởi tạo security
                    SecuritySystem.init();
                    
                    if (!SecuritySystem.isSecure()) {
                        return;
                    }
                    
                    // Tạo particles
                    this.createParticles();
                    
                    // Setup events
                    this.setupEvents();
                    
                    // Kiểm tra URL và quyết định flow
                    this.checkURLAndProceed();
                },

                createParticles: function() {
                    const container = document.getElementById('particles');
                    const fragment = document.createDocumentFragment();
                    
                    for (let i = 0; i < 40; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'particle';
                        const size = Math.random() * 5 + 2;
                        particle.style.width = size + 'px';
                        particle.style.height = size + 'px';
                        particle.style.left = Math.random() * 100 + '%';
                        particle.style.top = Math.random() * 100 + '%';
                        particle.style.animationDelay = Math.random() * 20 + 's';
                        particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                        fragment.appendChild(particle);
                    }
                    
                    container.appendChild(fragment);
                },

                setupEvents: function() {
                    // GET KEY button
                    UIManager.elements.getKeyBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.handleGetKey();
                    });

                    // NEW KEY button
                    UIManager.elements.newKeyBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        StorageManager.clearAll();
                        UIManager.showGetKeyButton();
                    });

                    // Copy key
                    UIManager.elements.keyDisplay.addEventListener('click', () => {
                        const text = UIManager.elements.keyDisplay.textContent;
                        if (text && 
                            text !== '-----' && 
                            text !== 'EXPIRED' && 
                            text !== '⚠️ SECURITY BREACH - PLEASE REFRESH' &&
                            !text.includes('Loading') &&
                            !UIManager.elements.keyDisplay.classList.contains('loading-key')) {
                            
                            navigator.clipboard.writeText(text).then(() => {
                                UIManager.showCopyNotification();
                            }).catch(() => {
                                const textarea = document.createElement('textarea');
                                textarea.value = text;
                                textarea.style.position = 'fixed';
                                textarea.style.opacity = '0';
                                document.body.appendChild(textarea);
                                textarea.select();
                                document.execCommand('copy');
                                document.body.removeChild(textarea);
                                UIManager.showCopyNotification();
                            });
                        }
                    });
                },

                checkURLAndProceed: function() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const page = urlParams.get('page');
                    const token = urlParams.get('token');
                    
                    // ===== CASE 1: TỪ SHORTENER (có ?page=key&token=auto) =====
                    if (page === 'key' && token === 'auto') {
                        const referrer = document.referrer.toLowerCase();
                        const isFromShortener = CONFIG.SHORTENER_DOMAINS.some(
                            domain => referrer.includes(domain)
                        );
                        
                        if (isFromShortener) {
                            // HỢP LỆ: Đến từ shortener -> TỰ ĐỘNG TẠO KEY
                            UIManager.showLoading('Verifying from shortener...');
                            
                            setTimeout(() => {
                                const newKey = generateKey();
                                const keyData = {
                                    key: newKey,
                                    expiry: Date.now() + CONFIG.KEY_DURATION
                                };
                                
                                StorageManager.saveKeyData(keyData);
                                sessionStorage.setItem(CONFIG.FINGERPRINT_KEY, generateFingerprint());
                                
                                UIManager.showKey(newKey, keyData.expiry);
                            }, 1500);
                            
                            return;
                        } else {
                            // KHÔNG HỢP LỆ: URL giả mạo -> Chuyển về GET KEY
                            UIManager.showGetKeyButton();
                            UIManager.showStatus('⚠️ Invalid access. Please use GET KEY.', 'error');
                            return;
                        }
                    }
                    
                    // ===== CASE 2: KIỂM TRA KEY CŨ TRONG STORAGE =====
                    const existingKey = StorageManager.loadKeyData();
                    
                    if (existingKey && existingKey.expiry > Date.now() && validateKey(existingKey.key)) {
                        // Key còn hạn -> Hiển thị
                        UIManager.showKey(existingKey.key, existingKey.expiry);
                        return;
                    }
                    
                    if (existingKey && existingKey.expiry <= Date.now()) {
                        // Key hết hạn
                        UIManager.handleExpiry();
                        return;
                    }
                    
                    // ===== CASE 3: MẶC ĐỊNH -> HIỂN THỊ GET KEY =====
                    UIManager.showGetKeyButton();
                },

                handleGetKey: function() {
                    if (!SecuritySystem.isSecure()) {
                        UIManager.showStatus('⚠️ Security error. Refresh page.', 'error');
                        return;
                    }
                    
                    UIManager.showStatus('🔄 Opening verification page...', '');
                    
                    // Lưu fingerprint
                    sessionStorage.setItem(CONFIG.FINGERPRINT_KEY, generateFingerprint());
                    
                    // Mở shortener
                    setTimeout(() => {
                        window.open(CONFIG.SHORTENER_URL, '_blank');
                    }, 300);
                }
            };

            // ========== START ==========
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => App.init());
            } else {
                App.init();
            }

            // Periodic check
            setInterval(() => {
                if (!SecuritySystem.isSecure() || !verifyFingerprint()) {
                    StorageManager.clearAll();
                    UIManager.showGetKeyButton();
                    UIManager.showStatus('⚠️ Session expired. Please get new key.', 'error');
                }
            }, 10000);

        })();
    </script>
</body>
</html>
