<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX HUB | Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .bg-aurora {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(76, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 255, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 80%, rgba(180, 100, 255, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 100, 200, 0.04) 0%, transparent 40%);
            animation: auroraMove 15s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes auroraMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, -1%) rotate(1deg); }
            50% { transform: translate(-1%, 1%) rotate(-1deg); }
            75% { transform: translate(-2%, -0.5%) rotate(0.5deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.4), rgba(0, 180, 255, 0.3));
            border-radius: 50%;
            animation: floatParticle 20s infinite;
        }

        @keyframes floatParticle {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1); 
                opacity: 0.2; 
            }
            10% { 
                transform: translateY(-100px) translateX(30px) scale(1.8); 
                opacity: 0.6; 
            }
            25% { 
                transform: translateY(-200px) translateX(-50px) scale(0.8); 
                opacity: 0.1; 
            }
            40% { 
                transform: translateY(-150px) translateX(70px) scale(1.5); 
                opacity: 0.5; 
            }
            60% { 
                transform: translateY(-300px) translateX(-80px) scale(0.6); 
                opacity: 0.3; 
            }
            80% { 
                transform: translateY(-100px) translateX(20px) scale(1.3); 
                opacity: 0.7; 
            }
        }

        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 550px;
        }

        .card-wrapper {
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .card {
            background: rgba(15, 15, 30, 0.8);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 1px 0 rgba(255, 255, 255, 0.08) inset,
                0 0 100px rgba(100, 50, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: cardGlow 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .card.expired {
            border-color: rgba(255, 100, 100, 0.3);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(255, 100, 100, 0.1) inset,
                0 0 100px rgba(255, 50, 50, 0.1);
        }

        @keyframes cardGlow {
            0%, 100% { 
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 100px rgba(100, 50, 255, 0.1);
            }
            50% { 
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 150px rgba(100, 50, 255, 0.2);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(120, 80, 255, 0.1) 25%, 
                rgba(0, 180, 255, 0.1) 50%, 
                rgba(180, 100, 255, 0.1) 75%, 
                transparent 100%);
            border-radius: 33px;
            z-index: -2;
            animation: borderRotate 8s linear infinite;
        }

        .card.expired::before {
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(255, 80, 80, 0.1) 25%, 
                rgba(255, 100, 100, 0.1) 50%, 
                rgba(255, 80, 80, 0.1) 75%, 
                transparent 100%);
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .brand-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, 
                #b894f7 0%, 
                #7eb8ff 25%, 
                #c4a6ff 50%, 
                #9d7bff 75%, 
                #b894f7 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: brandShine 4s linear infinite;
            filter: drop-shadow(0 0 40px rgba(140, 100, 255, 0.6));
            transition: all 0.5s ease;
        }

        .brand.expired {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e, #ff6b6b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(255, 80, 80, 0.6));
        }

        @keyframes brandShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(180, 150, 255, 0.8), 
                transparent);
            margin: 15px auto;
            animation: dividerPulse 2s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .divider.expired {
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 100, 100, 0.8), 
                transparent);
        }

        @keyframes dividerPulse {
            0%, 100% { opacity: 0.5; width: 60px; }
            50% { opacity: 1; width: 100px; }
        }

        .subtitle {
            color: rgba(200, 200, 230, 0.6);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: subtitleFade 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .subtitle.expired {
            color: rgba(255, 150, 150, 0.8);
        }

        @keyframes subtitleFade {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .key-area {
            background: rgba(10, 10, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 25px;
            margin: 30px 0;
            text-align: center;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .key-area.expired-area {
            border-color: rgba(255, 100, 100, 0.2);
            background: rgba(25, 10, 10, 0.7);
            animation: expiredPulse 2s ease-in-out infinite;
        }

        @keyframes expiredPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 50, 50, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 50, 50, 0.2); }
        }

        .key-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(160, 140, 255, 0.5), 
                transparent);
            animation: scanLine 4s ease-in-out infinite;
        }

        .key-area.expired-area::before {
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 100, 100, 0.5), 
                transparent);
        }

        @keyframes scanLine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .key-label {
            color: rgba(180, 170, 210, 0.7);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            transition: all 0.5s ease;
        }

        .key-label.expired-label {
            color: rgba(255, 150, 150, 0.8);
        }

        .key-value {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 1.1rem;
            color: #e8dfff;
            background: rgba(0, 0, 0, 0.4);
            padding: 18px 20px;
            border-radius: 12px;
            border: 1px solid rgba(160, 140, 220, 0.3);
            word-break: break-all;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
        }

        .key-value.expired-key {
            color: #ff6b6b;
            border-color: rgba(255, 100, 100, 0.3);
            background: rgba(25, 0, 0, 0.4);
            animation: expiredKeyGlow 1.5s ease-in-out infinite;
            cursor: not-allowed;
        }

        @keyframes expiredKeyGlow {
            0%, 100% { 
                border-color: rgba(255, 100, 100, 0.3);
                box-shadow: 0 0 10px rgba(255, 50, 50, 0.1);
            }
            50% { 
                border-color: rgba(255, 100, 100, 0.6);
                box-shadow: 0 0 30px rgba(255, 50, 50, 0.3);
            }
        }

        .key-value:hover {
            border-color: rgba(180, 160, 240, 0.6);
            box-shadow: 0 0 30px rgba(120, 80, 255, 0.2);
            transform: scale(1.02);
        }

        .key-value.expired-key:hover {
            transform: none;
            box-shadow: none;
            border-color: rgba(255, 100, 100, 0.3);
        }

        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
            color: #b8a9e0;
            font-size: 0.9rem;
            transition: all 0.5s ease;
        }

        .timer-container.hidden {
            display: none;
        }

        .timer {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #f0c27b, #f8a55a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: timerPulse 1s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .btn {
            width: 100%;
            padding: 18px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            background: linear-gradient(135deg, 
                rgba(50, 25, 80, 0.9), 
                rgba(30, 20, 60, 0.9));
            color: #e0d0ff;
            border: 1px solid rgba(200, 170, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            animation: btnFloat 3s ease-in-out infinite;
        }

        @keyframes btnFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, 
                rgba(255, 255, 255, 0.1) 0%, 
                transparent 60%);
            animation: btnRipple 3s infinite;
        }

        @keyframes btnRipple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(200, 170, 255, 0.6);
            box-shadow: 
                0 20px 40px rgba(100, 50, 200, 0.4),
                0 0 80px rgba(120, 80, 255, 0.3);
            animation: none;
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
            transition: all 0.1s;
        }

        .btn-new-key {
            background: linear-gradient(135deg, 
                rgba(80, 25, 25, 0.9), 
                rgba(60, 20, 20, 0.9));
            border-color: rgba(255, 100, 100, 0.3);
            color: #ffcccc;
            animation: newKeyBtnPulse 2s ease-in-out infinite;
        }

        @keyframes newKeyBtnPulse {
            0%, 100% { 
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 50, 50, 0.2);
            }
            50% { 
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 50, 50, 0.4);
            }
        }

        .btn-new-key:hover {
            border-color: rgba(255, 150, 150, 0.6);
            box-shadow: 
                0 20px 40px rgba(255, 50, 50, 0.4),
                0 0 80px rgba(255, 80, 80, 0.3);
        }

        .hidden {
            display: none !important;
        }

        .status-message {
            color: #b8a0e0;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.8;
            animation: messageFade 2s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .status-message.expired-message {
            color: #ff9999;
            animation: expiredMessagePulse 2s ease-in-out infinite;
        }

        @keyframes expiredMessagePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes messageFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .copy-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(40, 20, 60, 0.95);
            color: #e0d0ff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 100;
            border: 1px solid rgba(200, 170, 255, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
                border-radius: 24px;
            }
            .brand {
                font-size: 2.2rem;
            }
            .key-value {
                font-size: 0.9rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-aurora"></div>
    <div class="grid-lines"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card-wrapper">
            <div class="card" id="mainCard">
                <div class="brand-container">
                    <div class="brand" id="brandText">APEX HUB</div>
                    <div class="divider" id="dividerLine"></div>
                    <div class="subtitle" id="subtitleText">Secure Key System</div>
                </div>

                <div id="page1">
                    <div class="key-area">
                        <div class="key-label">YOUR LICENSE KEY</div>
                        <div class="key-value" style="opacity: 0.5;">-----</div>
                    </div>
                    <button class="btn" id="getKeyBtn">GET KEY</button>
                    <div class="status-message">Click to verify and get your key</div>
                </div>

                <div id="page2" class="hidden">
                    <div class="key-area" id="keyArea">
                        <div class="key-label" id="keyLabel">YOUR LICENSE KEY</div>
                        <div class="key-value" id="keyDisplay" title="Click to copy">-----</div>
                        <div class="timer-container" id="timerContainer">
                            <span>Time remaining</span>
                            <span class="timer" id="countdown">24:00:00</span>
                        </div>
                    </div>
                    <button class="btn btn-new-key hidden" id="newKeyBtn">GET NEW KEY</button>
                    <div class="status-message" id="statusMessage"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ ENHANCED SECURITY: Anti-tampering IIFE wrapper ============
            const SECURITY = {
                _integrityToken: null,
                _initialized: false,
                _blocked: false
            };

            // ============ CONFIGURATION (Obfuscated) ============
            const CONFIG = (() => {
                const _0x = ['link4m.org', 'hXPIjdW', 'Free_', 'apex', '24h'];
                return {
                    SHORTENER_URL: 'https://' + _0x[0] + '/' + _0x[1],
                    SHORTENER_DOMAINS: [_0x[0], 'link4m.net', 'link4m.com'],
                    KEY_PREFIX: _0x[2],
                    REQUIRED_WORD: _0x[3],
                    SPECIAL_CHARS: 'qptoeugjwmxnalkjf¡¿\'-:;₫&@9275023#%*^+€¥$_|\\[]{}bcz',
                    KEY_DURATION: 24 * 60 * 60 * 1000,
                    MAX_FAILED_ATTEMPTS: 3,
                    RATE_LIMIT_WINDOW: 60000,
                    MAX_REQUESTS_PER_WINDOW: 5,
                    VERIFICATION_TIMEOUT: 30000 // 30 seconds (reduced from 5 min)
                };
            })();

            // ============ ENHANCED STORAGE WITH ENCRYPTION ============
            const StorageManager = {
                _secretKey: null,
                
                init() {
                    this._secretKey = this._generateStorageKey();
                    return this;
                },
                
                _generateStorageKey() {
                    const entropy = new Uint8Array(32);
                    crypto.getRandomValues(entropy);
                    return Array.from(entropy, b => b.toString(16).padStart(2, '0')).join('');
                },
                
                _getNamespacedKey(key) {
                    return 'ah_' + this._secretKey.substring(0, 12) + '_' + key;
                },
                
                _encrypt(data) {
                    try {
                        const jsonStr = JSON.stringify(data);
                        const timestamp = Date.now().toString(36);
                        const salt = crypto.getRandomValues(new Uint8Array(4)).join('');
                        const combined = timestamp + '|' + salt + '|' + jsonStr;
                        return btoa(unescape(encodeURIComponent(combined)));
                    } catch(e) {
                        return null;
                    }
                },
                
                _decrypt(encrypted) {
                    try {
                        const decoded = decodeURIComponent(escape(atob(encrypted)));
                        const parts = decoded.split('|');
                        if (parts.length < 3) return null;
                        
                        const timestamp = parseInt(parts[0], 36);
                        if (Date.now() - timestamp > CONFIG.KEY_DURATION + 3600000) {
                            return null;
                        }
                        
                        return JSON.parse(parts.slice(2).join('|'));
                    } catch(e) {
                        return null;
                    }
                },
                
                set(key, value) {
                    const namespacedKey = this._getNamespacedKey(key);
                    const encrypted = this._encrypt(value);
                    if (!encrypted) return false;
                    
                    const secureData = {
                        data: encrypted,
                        timestamp: Date.now(),
                        checksum: this._generateChecksum(encrypted)
                    };
                    
                    try {
                        sessionStorage.setItem(namespacedKey, JSON.stringify(secureData));
                        return true;
                    } catch(e) {
                        return false;
                    }
                },
                
                get(key) {
                    const namespacedKey = this._getNamespacedKey(key);
                    try {
                        const raw = sessionStorage.getItem(namespacedKey);
                        if (!raw) return null;
                        
                        const secureData = JSON.parse(raw);
                        if (!secureData.data || !secureData.checksum) return null;
                        
                        if (secureData.checksum !== this._generateChecksum(secureData.data)) {
                            this.remove(key);
                            return null;
                        }
                        
                        return this._decrypt(secureData.data);
                    } catch(e) {
                        this.remove(key);
                        return null;
                    }
                },
                
                remove(key) {
                    const namespacedKey = this._getNamespacedKey(key);
                    sessionStorage.removeItem(namespacedKey);
                },
                
                clear() {
                    const prefix = this._getNamespacedKey('');
                    const keys = Object.keys(sessionStorage);
                    keys.forEach(key => {
                        if (key.startsWith(prefix)) {
                            sessionStorage.removeItem(key);
                        }
                    });
                },
                
                _generateChecksum(data) {
                    let hash = 5381;
                    for (let i = 0; i < data.length; i++) {
                        hash = ((hash << 5) + hash) + data.charCodeAt(i);
                        hash = hash & hash;
                    }
                    return Math.abs(hash).toString(36);
                }
            };

            // ============ ENHANCED FINGERPRINT ============
            const FingerprintManager = {
                generate() {
                    const components = [
                        navigator.userAgent,
                        navigator.language,
                        screen.colorDepth,
                        screen.width + 'x' + screen.height,
                        new Date().getTimezoneOffset(),
                        navigator.hardwareConcurrency || 'unknown',
                        navigator.deviceMemory || 'unknown',
                        this._getCanvasFingerprint(),
                        this._getWebGLFingerprint(),
                        this._getAudioFingerprint(),
                        this._getFontFingerprint()
                    ];
                    
                    return this._hash(components.join('|||'));
                },
                
                _getCanvasFingerprint() {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = 200;
                        canvas.height = 50;
                        const ctx = canvas.getContext('2d');
                        ctx.textBaseline = 'top';
                        ctx.font = '14px Arial';
                        ctx.fillStyle = '#f60';
                        ctx.fillRect(125, 1, 62, 20);
                        ctx.fillStyle = '#069';
                        ctx.fillText('APEX HUB Security', 2, 15);
                        ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                        ctx.fillText('Canvas FP', 4, 17);
                        return canvas.toDataURL();
                    } catch(e) {
                        return 'canvas-error';
                    }
                },
                
                _getWebGLFingerprint() {
                    try {
                        const canvas = document.createElement('canvas');
                        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                        if (!gl) return 'no-webgl';
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'webgl-no-debug';
                    } catch(e) {
                        return 'webgl-error';
                    }
                },
                
                _getAudioFingerprint() {
                    try {
                        const audioCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
                        const oscillator = audioCtx.createOscillator();
                        const compressor = audioCtx.createDynamicsCompressor();
                        oscillator.type = 'triangle';
                        compressor.threshold.setValueAtTime(-50, audioCtx.currentTime);
                        compressor.knee.setValueAtTime(40, audioCtx.currentTime);
                        compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
                        compressor.attack.setValueAtTime(0, audioCtx.currentTime);
                        compressor.release.setValueAtTime(0.25, audioCtx.currentTime);
                        oscillator.connect(compressor);
                        compressor.connect(audioCtx.destination);
                        oscillator.start(0);
                        return 'audio-supported';
                    } catch(e) {
                        return 'audio-error';
                    }
                },
                
                _getFontFingerprint() {
                    const fonts = ['monospace', 'sans-serif', 'serif'];
                    const testString = 'mmmmmmmmmmlli';
                    const results = [];
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    fonts.forEach(font => {
                        ctx.font = '72px ' + font;
                        const width = ctx.measureText(testString).width;
                        results.push(width);
                    });
                    
                    return results.join(',');
                },
                
                _hash(str) {
                    let hash = 0;
                    for (let i = 0; i < str.length; i++) {
                        const char = str.charCodeAt(i);
                        hash = ((hash << 5) - hash) + char;
                        hash = hash & hash;
                    }
                    return Math.abs(hash).toString(36);
                },
                
                verify(storedFingerprint) {
                    const current = this.generate();
                    return storedFingerprint === current;
                }
            };

            // ============ ENHANCED RATE LIMITER ============
            const RateLimiter = {
                _requests: [],
                
                checkLimit() {
                    const now = Date.now();
                    this._requests = this._requests.filter(time => now - time < CONFIG.RATE_LIMIT_WINDOW);
                    
                    if (this._requests.length >= CONFIG.MAX_REQUESTS_PER_WINDOW) {
                        return false;
                    }
                    
                    this._requests.push(now);
                    return true;
                },
                
                getRemainingRequests() {
                    const now = Date.now();
                    this._requests = this._requests.filter(time => now - time < CONFIG.RATE_LIMIT_WINDOW);
                    return CONFIG.MAX_REQUESTS_PER_WINDOW - this._requests.length;
                }
            };

            // ============ ENHANCED KEY GENERATOR ============
            const KeyGenerator = {
                generate() {
                    const nonce = this._generateNonce();
                    let key = CONFIG.KEY_PREFIX;
                    
                    const randomBytes = new Uint8Array(24);
                    crypto.getRandomValues(randomBytes);
                    const randomStr = Array.from(randomBytes, b => b.toString(16).padStart(2, '0')).join('');
                    
                    const specialPart = this._generateSpecialPart();
                    const position = Math.floor(crypto.getRandomValues(new Uint8Array(1))[0] % 3);
                    
                    switch(position) {
                        case 0:
                            key += CONFIG.REQUIRED_WORD + specialPart + randomStr;
                            break;
                        case 1:
                            const mid = Math.floor(specialPart.length / 2);
                            key += specialPart.substring(0, mid) + CONFIG.REQUIRED_WORD + specialPart.substring(mid) + randomStr;
                            break;
                        case 2:
                            key += specialPart + randomStr + CONFIG.REQUIRED_WORD;
                            break;
                    }
                    
                    const nonceHash = btoa(nonce).substring(0, 6);
                    key += nonceHash;
                    
                    if (!this._validateKey(key)) {
                        key += CONFIG.SPECIAL_CHARS.substring(0, 12);
                    }
                    
                    return { key, nonce };
                },
                
                _generateNonce() {
                    const nonce = new Uint8Array(16);
                    crypto.getRandomValues(nonce);
                    return Array.from(nonce, b => b.toString(16).padStart(2, '0')).join('');
                },
                
                _generateSpecialPart() {
                    const chars = CONFIG.SPECIAL_CHARS;
                    const length = Math.floor(crypto.getRandomValues(new Uint8Array(1))[0] % 20) + 15;
                    let result = '';
                    const randomBytes = new Uint8Array(length);
                    crypto.getRandomValues(randomBytes);
                    
                    for (let i = 0; i < length; i++) {
                        result += chars[randomBytes[i] % chars.length];
                    }
                    
                    return result;
                },
                
                _validateKey(key) {
                    if (!key || typeof key !== 'string') return false;
                    if (!key.startsWith(CONFIG.KEY_PREFIX)) return false;
                    if (!key.includes(CONFIG.REQUIRED_WORD)) return false;
                    if (!/[¡¿'\-:;₫&@#%*^+€¥$_|\\\[\]{}]/.test(key)) return false;
                    if (key.length < 40) return false;
                    return true;
                }
            };

            // ============ ENHANCED ANTI-DEBUG ============
            const AntiDebug = {
                _devtoolsOpen: false,
                _debuggerAttempts: 0,
                _lastDetectionTime: 0,
                
                init() {
                    this._detectDevTools();
                    this._blockShortcuts();
                    this._detectDebugger();
                    this._protectConsole();
                    this._detectTampering();
                },
                
                _detectDevTools() {
                    const threshold = 160;
                    
                    setInterval(() => {
                        const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                        const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                        
                        if (widthThreshold || heightThreshold) {
                            if (!this._devtoolsOpen) {
                                this._devtoolsOpen = true;
                                this._handleDetection('DevTools opened');
                            }
                        } else {
                            this._devtoolsOpen = false;
                        }
                    }, 500);
                    
                    // Performance timing detection
                    const start = performance.now();
                    debugger;
                    const end = performance.now();
                    if (end - start > 100) {
                        this._handleDetection('Debugger timing detected');
                    }
                },
                
                _blockShortcuts() {
                    const blockedKeys = ['F12', 'F3'];
                    const blockedCombos = [
                        { ctrl: true, shift: true, key: 'I' },
                        { ctrl: true, shift: true, key: 'J' },
                        { ctrl: true, shift: true, key: 'C' },
                        { ctrl: true, key: 'U' },
                        { ctrl: true, key: 'S' }
                    ];
                    
                    document.addEventListener('keydown', (e) => {
                        if (blockedKeys.includes(e.key) || 
                            blockedCombos.some(combo => 
                                e.ctrlKey === !!combo.ctrl && 
                                e.shiftKey === !!combo.shift && 
                                e.key.toUpperCase() === combo.key
                            )) {
                            e.preventDefault();
                            e.stopPropagation();
                            return false;
                        }
                    }, true);
                    
                    document.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        return false;
                    });
                },
                
                _detectDebugger() {
                    const self = this;
                    setInterval(function() {
                        const startTime = performance.now();
                        debugger;
                        const endTime = performance.now();
                        if (endTime - startTime > 100) {
                            self._debuggerAttempts++;
                            if (self._debuggerAttempts > 3) {
                                self._handleDetection('Debugger statement detected');
                            }
                        }
                    }, 2000);
                },
                
                _protectConsole() {
                    const methods = ['log', 'warn', 'error', 'info', 'debug', 'clear', 'table', 'trace'];
                    const self = this;
                    
                    methods.forEach(method => {
                        const original = console[method];
                        Object.defineProperty(console, method, {
                            get: function() {
                                return function() {};
                            },
                            set: function() {
                                self._handleDetection('Console tampered');
                            },
                            configurable: false
                        });
                    });
                },
                
                _detectTampering() {
                    const observer = new MutationObserver((mutations) => {
                        mutations.forEach((mutation) => {
                            if (mutation.type === 'childList' || mutation.type === 'attributes') {
                                const target = mutation.target;
                                if (target.id && ['mainCard', 'keyDisplay', 'getKeyBtn'].includes(target.id)) {
                                    this._handleDetection('DOM tampered');
                                }
                            }
                        });
                    });
                    
                    observer.observe(document.body, {
                        childList: true,
                        subtree: true,
                        attributes: true,
                        attributeFilter: ['style', 'class', 'id']
                    });
                },
                
                _handleDetection(reason) {
                    const now = Date.now();
                    if (now - this._lastDetectionTime < 5000) return; // Prevent spam
                    this._lastDetectionTime = now;
                    
                    console.clear();
                    StorageManager.clear();
                    
                    if (window.location.href.includes('localhost')) {
                        console.warn('Security detection:', reason);
                    } else {
                        // Force clean reload
                        document.body.innerHTML = '';
                        setTimeout(() => {
                            window.location.href = 'about:blank';
                        }, 100);
                    }
                }
            };

            // ============ ENHANCED VERIFICATION ============
            const VerificationSystem = {
                verify() {
                    const checks = [];
                    
                    // Check 1: Referrer verification
                    const referrer = document.referrer.toLowerCase();
                    const fromShortener = CONFIG.SHORTENER_DOMAINS.some(domain => referrer.includes(domain));
                    checks.push(fromShortener);
                    
                    // Check 2: URL token verification with strict timeout
                    const urlParams = new URLSearchParams(window.location.search);
                    const hasToken = urlParams.get('token') === 'auto';
                    const isKeyPage = urlParams.get('page') === 'key';
                    const storedToken = StorageManager.get('verification_token');
                    const storedTimestamp = StorageManager.get('verification_timestamp');
                    
                    let tokenValid = false;
                    if (hasToken && isKeyPage && storedToken && storedTimestamp) {
                        const timeDiff = Date.now() - storedTimestamp;
                        tokenValid = storedToken === 'auto' && timeDiff < CONFIG.VERIFICATION_TIMEOUT;
                    }
                    checks.push(tokenValid);
                    
                    // Check 3: Stored verification
                    checks.push(StorageManager.get('verified') === true);
                    
                    // Check 4: Fingerprint verification
                    const storedFingerprint = StorageManager.get('fingerprint');
                    checks.push(storedFingerprint && FingerprintManager.verify(storedFingerprint));
                    
                    // Check 5: Rate limit
                    checks.push(RateLimiter.checkLimit());
                    
                    // Check 6: Human behavior verification
                    checks.push(this._verifyHumanBehavior());
                    
                    // ALL checks must pass (changed from >= 3)
                    return checks.every(c => c === true);
                },
                
                _verifyHumanBehavior() {
                    // Check for basic browser automation indicators
                    const indicators = [
                        navigator.webdriver === false || navigator.webdriver === undefined,
                        !window.chrome || window.chrome.runtime !== undefined,
                        navigator.plugins.length > 0,
                        !window._phantom,
                        !window.__nightmare,
                        !window.callPhantom
                    ];
                    
                    return indicators.filter(i => i).length >= 4;
                },
                
                markAsVerified() {
                    StorageManager.set('verified', true);
                    StorageManager.set('verification_token', 'auto');
                    StorageManager.set('verification_timestamp', Date.now());
                    StorageManager.set('fingerprint', FingerprintManager.generate());
                    
                    // Clean URL
                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
            };

            // ============ UI ELEMENTS ============
            const mainCard = document.getElementById('mainCard');
            const brandText = document.getElementById('brandText');
            const dividerLine = document.getElementById('dividerLine');
            const subtitleText = document.getElementById('subtitleText');
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            const keyArea = document.getElementById('keyArea');
            const keyLabel = document.getElementById('keyLabel');
            const getKeyBtn = document.getElementById('getKeyBtn');
            const newKeyBtn = document.getElementById('newKeyBtn');
            const keyDisplay = document.getElementById('keyDisplay');
            const countdown = document.getElementById('countdown');
            const timerContainer = document.getElementById('timerContainer');
            const statusMessage = document.getElementById('statusMessage');
            
            let countdownInterval = null;
            let currentExpiry = null;

            // ============ COUNTDOWN ============
            function startCountdown(expiry) {
                stopCountdown();
                currentExpiry = expiry;
                
                function update() {
                    const remaining = currentExpiry - Date.now();
                    if (remaining <= 0) {
                        handleExpiry();
                        return;
                    }
                    
                    const h = Math.floor(remaining / 3600000);
                    const m = Math.floor((remaining % 3600000) / 60000);
                    const s = Math.floor((remaining % 60000) / 1000);
                    countdown.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }
                
                update();
                countdownInterval = setInterval(update, 1000);
            }

            function stopCountdown() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                currentExpiry = null;
            }

            // ============ HANDLE EXPIRY ============
            function handleExpiry() {
                stopCountdown();
                
                keyDisplay.textContent = 'EXPIRED';
                keyDisplay.classList.add('expired-key');
                keyDisplay.style.cursor = 'not-allowed';
                
                timerContainer.classList.add('hidden');
                
                mainCard.classList.add('expired');
                brandText.classList.add('expired');
                dividerLine.classList.add('expired');
                subtitleText.classList.add('expired');
                keyArea.classList.add('expired-area');
                keyLabel.classList.add('expired-label');
                statusMessage.classList.add('expired-message');
                
                newKeyBtn.classList.remove('hidden');
                statusMessage.textContent = 'Key has expired. Please get a new key.';
                
                StorageManager.clear();
            }

            function resetExpiredState() {
                mainCard.classList.remove('expired');
                brandText.classList.remove('expired');
                dividerLine.classList.remove('expired');
                subtitleText.classList.remove('expired');
                keyArea.classList.remove('expired-area');
                keyLabel.classList.remove('expired-label');
                keyDisplay.classList.remove('expired-key');
                keyDisplay.style.cursor = 'pointer';
                statusMessage.classList.remove('expired-message');
                timerContainer.classList.remove('hidden');
                newKeyBtn.classList.add('hidden');
            }

            // ============ PAGE MANAGEMENT ============
            function showPage1() {
                page1.classList.remove('hidden');
                page2.classList.add('hidden');
                stopCountdown();
                resetExpiredState();
                statusMessage.textContent = 'Click to verify and get your key';
            }

            function showPage2() {
                page1.classList.add('hidden');
                page2.classList.remove('hidden');
            }

            function displayKey(keyData) {
                resetExpiredState();
                
                keyDisplay.textContent = keyData.key;
                keyDisplay.style.opacity = '1';
                timerContainer.classList.remove('hidden');
                newKeyBtn.classList.add('hidden');
                statusMessage.textContent = 'Click on key to copy';
                showPage2();
                startCountdown(keyData.expiry);
            }

            // ============ COPY WITH TIMING PROTECTION ============
            keyDisplay.addEventListener('click', function() {
                const text = keyDisplay.textContent;
                if (text && text !== '-----' && text !== 'EXPIRED' && !keyDisplay.classList.contains('expired-key')) {
                    // Timing check to prevent automated copying
                    const clickTime = Date.now();
                    if (window._lastClickTime && clickTime - window._lastClickTime < 200) {
                        return; // Too fast, likely automated
                    }
                    window._lastClickTime = clickTime;
                    
                    navigator.clipboard.writeText(text).then(() => {
                        showCopyNotification('Key copied successfully');
                    }).catch(() => {
                        // Clipboard API might be blocked, try fallback
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        textarea.style.position = 'fixed';
                        textarea.style.opacity = '0';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        showCopyNotification('Key copied successfully');
                    });
                }
            });

            function showCopyNotification(message) {
                const oldNotification = document.querySelector('.copy-notification');
                if (oldNotification) oldNotification.remove();
                
                const notification = document.createElement('div');
                notification.className = 'copy-notification';
                notification.textContent = message;
                document.body.appendChild(notification);
                
                setTimeout(() => notification.classList.add('show'), 10);
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 400);
                }, 2000);
            }

            // ============ INITIALIZATION ============
            function initialize() {
                const isVerified = VerificationSystem.verify();
                const secureData = StorageManager.get('key_data');
                
                if (secureData && secureData.expiry > Date.now() && KeyGenerator._validateKey(secureData.key)) {
                    displayKey(secureData);
                    return;
                }
                
                if (secureData && secureData.expiry <= Date.now()) {
                    StorageManager.clear();
                    showPage2();
                    handleExpiry();
                    return;
                }
                
                if (isVerified) {
                    const { key, nonce } = KeyGenerator.generate();
                    const keyData = {
                        key: key,
                        expiry: Date.now() + CONFIG.KEY_DURATION,
                        created: Date.now(),
                        nonce: nonce
                    };
                    StorageManager.set('key_data', keyData);
                    displayKey(keyData);
                    VerificationSystem.markAsVerified();
                } else {
                    showPage1();
                }
            }

            // ============ BUTTON HANDLERS ============
            getKeyBtn.addEventListener('click', function() {
                if (!RateLimiter.checkLimit()) {
                    statusMessage.textContent = 'Too many requests. Please wait.';
                    return;
                }
                
                const { key, nonce } = KeyGenerator.generate();
                const keyData = {
                    key: key,
                    expiry: Date.now() + CONFIG.KEY_DURATION,
                    created: Date.now(),
                    nonce: nonce
                };
                StorageManager.set('key_data', keyData);
                VerificationSystem.markAsVerified();
                
                window.open(CONFIG.SHORTENER_URL, '_blank');
                statusMessage.textContent = 'Opening verification page...';
            });

            newKeyBtn.addEventListener('click', function() {
                StorageManager.clear();
                stopCountdown();
                resetExpiredState();
                showPage1();
            });

            // ============ PARTICLES ============
            function createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 40; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = Math.random() * 5 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 20 + 's';
                    particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                    container.appendChild(particle);
                }
            }

            // ============ PERIODIC SECURITY CHECKS ============
            setInterval(() => {
                // Check key expiry
                const data = StorageManager.get('key_data');
                if (data && data.expiry <= Date.now() && currentExpiry) {
                    handleExpiry();
                }
                
                // Verify fingerprint hasn't changed
                const storedFingerprint = StorageManager.get('fingerprint');
                if (storedFingerprint && !FingerprintManager.verify(storedFingerprint)) {
                    StorageManager.clear();
                    handleExpiry();
                }
                
                // Check if devtools is open
                const performanceCheck = performance.now();
                debugger;
                if (performance.now() - performanceCheck > 50) {
                    AntiDebug._handleDetection('Performance debugger detection');
                }
            }, 3000);

            // ============ START ============
            StorageManager.init();
            createParticles();
            AntiDebug.init();
            
            // Initialize security token
            SECURITY._integrityToken = btoa(Date.now().toString(36) + Math.random().toString(36));
            SECURITY._initialized = true;
            
            initialize();
            
            // Disable console in production
            if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                const methods = ['log', 'warn', 'error', 'info', 'debug', 'clear', 'table', 'trace', 'dir', 'group', 'groupCollapsed', 'groupEnd', 'time', 'timeEnd', 'profile', 'profileEnd'];
                methods.forEach(method => {
                    console[method] = function() {};
                });
            }

        })();
    </script>
</body>
