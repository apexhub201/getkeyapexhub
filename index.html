<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX HUB | Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-aurora {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(76, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 255, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 80%, rgba(180, 100, 255, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 100, 200, 0.04) 0%, transparent 40%);
            animation: auroraMove 15s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes auroraMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, -1%) rotate(1deg); }
            50% { transform: translate(-1%, 1%) rotate(-1deg); }
            75% { transform: translate(-2%, -0.5%) rotate(0.5deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.4), rgba(0, 180, 255, 0.3));
            border-radius: 50%;
            animation: floatParticle 20s infinite;
        }

        @keyframes floatParticle {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1); 
                opacity: 0.2; 
            }
            10% { 
                transform: translateY(-100px) translateX(30px) scale(1.8); 
                opacity: 0.6; 
            }
            25% { 
                transform: translateY(-200px) translateX(-50px) scale(0.8); 
                opacity: 0.1; 
            }
            40% { 
                transform: translateY(-150px) translateX(70px) scale(1.5); 
                opacity: 0.5; 
            }
            60% { 
                transform: translateY(-300px) translateX(-80px) scale(0.6); 
                opacity: 0.3; 
            }
            80% { 
                transform: translateY(-100px) translateX(20px) scale(1.3); 
                opacity: 0.7; 
            }
        }

        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 550px;
        }

        .card-wrapper {
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .card {
            background: rgba(15, 15, 30, 0.8);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 1px 0 rgba(255, 255, 255, 0.08) inset,
                0 0 100px rgba(100, 50, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: cardGlow 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .card.expired {
            border-color: rgba(255, 100, 100, 0.3);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(255, 100, 100, 0.1) inset,
                0 0 100px rgba(255, 50, 50, 0.1);
        }

        @keyframes cardGlow {
            0%, 100% { 
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 100px rgba(100, 50, 255, 0.1);
            }
            50% { 
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 150px rgba(100, 50, 255, 0.2);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(120, 80, 255, 0.1) 25%, 
                rgba(0, 180, 255, 0.1) 50%, 
                rgba(180, 100, 255, 0.1) 75%, 
                transparent 100%);
            border-radius: 33px;
            z-index: -2;
            animation: borderRotate 8s linear infinite;
        }

        .card.expired::before {
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(255, 80, 80, 0.1) 25%, 
                rgba(255, 100, 100, 0.1) 50%, 
                rgba(255, 80, 80, 0.1) 75%, 
                transparent 100%);
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .brand-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, 
                #b894f7 0%, 
                #7eb8ff 25%, 
                #c4a6ff 50%, 
                #9d7bff 75%, 
                #b894f7 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: brandShine 4s linear infinite;
            filter: drop-shadow(0 0 40px rgba(140, 100, 255, 0.6));
            transition: all 0.5s ease;
        }

        .brand.expired {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e, #ff6b6b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(255, 80, 80, 0.6));
        }

        @keyframes brandShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(180, 150, 255, 0.8), 
                transparent);
            margin: 15px auto;
            animation: dividerPulse 2s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .divider.expired {
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 100, 100, 0.8), 
                transparent);
        }

        @keyframes dividerPulse {
            0%, 100% { opacity: 0.5; width: 60px; }
            50% { opacity: 1; width: 100px; }
        }

        .subtitle {
            color: rgba(200, 200, 230, 0.6);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: subtitleFade 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .subtitle.expired {
            color: rgba(255, 150, 150, 0.8);
        }

        @keyframes subtitleFade {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .key-area {
            background: rgba(10, 10, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 25px;
            margin: 30px 0;
            text-align: center;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .key-area.expired-area {
            border-color: rgba(255, 100, 100, 0.2);
            background: rgba(25, 10, 10, 0.7);
            animation: expiredPulse 2s ease-in-out infinite;
        }

        @keyframes expiredPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 50, 50, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 50, 50, 0.2); }
        }

        .key-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(160, 140, 255, 0.5), 
                transparent);
            animation: scanLine 4s ease-in-out infinite;
        }

        .key-area.expired-area::before {
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 100, 100, 0.5), 
                transparent);
        }

        @keyframes scanLine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .key-label {
            color: rgba(180, 170, 210, 0.7);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            transition: all 0.5s ease;
        }

        .key-label.expired-label {
            color: rgba(255, 150, 150, 0.8);
        }

        .key-value {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 1.1rem;
            color: #e8dfff;
            background: rgba(0, 0, 0, 0.4);
            padding: 18px 20px;
            border-radius: 12px;
            border: 1px solid rgba(160, 140, 220, 0.3);
            word-break: break-all;
            letter-spacing: 0.5px;
            user-select: all;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
        }

        .key-value.expired-key {
            color: #ff6b6b;
            border-color: rgba(255, 100, 100, 0.3);
            background: rgba(25, 0, 0, 0.4);
            animation: expiredKeyGlow 1.5s ease-in-out infinite;
            cursor: not-allowed;
            user-select: none;
        }

        @keyframes expiredKeyGlow {
            0%, 100% { 
                border-color: rgba(255, 100, 100, 0.3);
                box-shadow: 0 0 10px rgba(255, 50, 50, 0.1);
            }
            50% { 
                border-color: rgba(255, 100, 100, 0.6);
                box-shadow: 0 0 30px rgba(255, 50, 50, 0.3);
            }
        }

        .key-value::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(160, 140, 255, 0.05) 50%, 
                transparent 70%);
            animation: keyHighlight 3s ease-in-out infinite;
        }

        @keyframes keyHighlight {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .key-value:hover {
            border-color: rgba(180, 160, 240, 0.6);
            box-shadow: 0 0 30px rgba(120, 80, 255, 0.2);
            transform: scale(1.02);
        }

        .key-value.expired-key:hover {
            transform: none;
            box-shadow: none;
            border-color: rgba(255, 100, 100, 0.3);
        }

        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
            color: #b8a9e0;
            font-size: 0.9rem;
            transition: all 0.5s ease;
        }

        .timer-container.hidden {
            display: none;
        }

        .timer {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #f0c27b, #f8a55a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: timerPulse 1s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .btn {
            width: 100%;
            padding: 18px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            background: linear-gradient(135deg, 
                rgba(50, 25, 80, 0.9), 
                rgba(30, 20, 60, 0.9));
            color: #e0d0ff;
            border: 1px solid rgba(200, 170, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            animation: btnFloat 3s ease-in-out infinite;
        }

        @keyframes btnFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, 
                rgba(255, 255, 255, 0.1) 0%, 
                transparent 60%);
            animation: btnRipple 3s infinite;
        }

        @keyframes btnRipple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(200, 170, 255, 0.6);
            box-shadow: 
                0 20px 40px rgba(100, 50, 200, 0.4),
                0 0 80px rgba(120, 80, 255, 0.3);
            animation: none;
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
            transition: all 0.1s;
        }

        .btn-new-key {
            background: linear-gradient(135deg, 
                rgba(80, 25, 25, 0.9), 
                rgba(60, 20, 20, 0.9));
            border-color: rgba(255, 100, 100, 0.3);
            color: #ffcccc;
            animation: newKeyBtnPulse 2s ease-in-out infinite;
        }

        @keyframes newKeyBtnPulse {
            0%, 100% { 
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 50, 50, 0.2);
            }
            50% { 
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 50, 50, 0.4);
            }
        }

        .btn-new-key:hover {
            border-color: rgba(255, 150, 150, 0.6);
            box-shadow: 
                0 20px 40px rgba(255, 50, 50, 0.4),
                0 0 80px rgba(255, 80, 80, 0.3);
        }

        .hidden {
            display: none !important;
        }

        .status-message {
            color: #b8a0e0;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.8;
            animation: messageFade 2s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .status-message.expired-message {
            color: #ff9999;
            animation: expiredMessagePulse 2s ease-in-out infinite;
        }

        @keyframes expiredMessagePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes messageFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .copy-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(40, 20, 60, 0.95);
            color: #e0d0ff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 100;
            border: 1px solid rgba(200, 170, 255, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
                border-radius: 24px;
            }
            .brand {
                font-size: 2.2rem;
            }
            .key-value {
                font-size: 0.9rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-aurora"></div>
    <div class="grid-lines"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card-wrapper">
            <div class="card" id="mainCard">
                <div class="brand-container">
                    <div class="brand" id="brandText">APEX HUB</div>
                    <div class="divider" id="dividerLine"></div>
                    <div class="subtitle" id="subtitleText">Secure Key System</div>
                </div>

                <!-- TRANG 1: GET KEY -->
                <div id="page1">
                    <div class="key-area">
                        <div class="key-label">YOUR LICENSE KEY</div>
                        <div class="key-value" style="opacity: 0.5;">-----</div>
                    </div>
                    <button class="btn" id="getKeyBtn">GET KEY</button>
                    <div class="status-message">Click to verify and get your key</div>
                </div>

                <!-- TRANG 2: HIỂN THỊ KEY + ĐẾM NGƯỢC -->
                <div id="page2" class="hidden">
                    <div class="key-area" id="keyArea">
                        <div class="key-label" id="keyLabel">YOUR LICENSE KEY</div>
                        <div class="key-value" id="keyDisplay" title="Click to copy">-----</div>
                        <div class="timer-container" id="timerContainer">
                            <span>Time remaining</span>
                            <span class="timer" id="countdown">00:03:00</span>
                        </div>
                    </div>
                    <!-- Nút GET NEW KEY (chỉ hiện khi hết hạn) -->
                    <button class="btn btn-new-key hidden" id="newKeyBtn">GET NEW KEY</button>
                    <div class="status-message" id="statusMessage"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ CONFIGURATION ============
            const SHORTENER_URL = 'https://link4m.org/hXPIjdW';
            const SHORTENER_DOMAINS = ['link4m.org', 'link4m.net', 'link4m.com', 'link4m'];
            const KEY_PREFIX = 'Free_';
            const REQUIRED_WORD = 'apex';
            const SPECIAL_CHARS = 'qptoeugjwmxnalkjf¡¿\'-:;₫&@9275023#%*^+€¥$_|\\[]{}bcz';
            const KEY_DURATION = 3 * 60 * 1000; // 3 PHÚT ĐỂ TEST
            
            const STORAGE_PREFIX = btoa(unescape(encodeURIComponent('apex_hub_'))).substring(0, 8);
            const KEY_DATA_KEY = STORAGE_PREFIX + '_kd';
            const VERIFICATION_KEY = STORAGE_PREFIX + '_vf';
            const TIMESTAMP_KEY = STORAGE_PREFIX + '_ts';
            const TOKEN_KEY = STORAGE_PREFIX + '_tk';
            const HASH_KEY = STORAGE_PREFIX + '_hs';
            const COUNTER_KEY = STORAGE_PREFIX + '_ct';
            const FINGERPRINT_KEY = STORAGE_PREFIX + '_fp';

            // ============ SECURITY FUNCTIONS ============
            function generateFingerprint() {
                const components = [
                    navigator.userAgent,
                    navigator.language,
                    screen.colorDepth,
                    screen.width + 'x' + screen.height,
                    new Date().getTimezoneOffset(),
                    !!window.sessionStorage,
                    !!window.localStorage,
                    navigator.hardwareConcurrency || 'unknown',
                    navigator.deviceMemory || 'unknown'
                ];
                return btoa(components.join('||')).substring(0, 32);
            }

            function verifyFingerprint() {
                const stored = sessionStorage.getItem(FINGERPRINT_KEY);
                const current = generateFingerprint();
                if (!stored) {
                    sessionStorage.setItem(FINGERPRINT_KEY, current);
                    return true;
                }
                return stored === current;
            }

            function checkRateLimit() {
                const counter = parseInt(sessionStorage.getItem(COUNTER_KEY) || '0');
                if (counter > 10) return false;
                sessionStorage.setItem(COUNTER_KEY, (counter + 1).toString());
                return true;
            }

            function advancedEncode(str) {
                let encoded = btoa(unescape(encodeURIComponent(str)));
                const salt = Date.now().toString(36);
                return salt + '.' + encoded.split('').reverse().join('');
            }

            function advancedDecode(str) {
                try {
                    const parts = str.split('.');
                    if (parts.length !== 2) return null;
                    const reversed = parts[1].split('').reverse().join('');
                    return decodeURIComponent(escape(atob(reversed)));
                } catch(e) {
                    return null;
                }
            }

            function generateMultiHash(data) {
                let hash1 = 0;
                let hash2 = 0;
                const str = JSON.stringify(data);
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash1 = ((hash1 << 5) - hash1) + char;
                    hash1 = hash1 & hash1;
                    hash2 = ((hash2 << 7) - hash2) + char;
                    hash2 = hash2 & hash2;
                }
                return Math.abs(hash1).toString(36) + '_' + Math.abs(hash2).toString(36);
            }

            function antiDebug() {
                let devtoolsOpen = false;
                const threshold = 160;
                
                setInterval(() => {
                    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                    if (widthThreshold || heightThreshold) {
                        if (!devtoolsOpen) {
                            devtoolsOpen = true;
                            clearAllData();
                            console.clear();
                        }
                    } else {
                        devtoolsOpen = false;
                    }
                }, 1000);
                
                document.addEventListener('keydown', function(e) {
                    if (
                        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                        (e.ctrlKey && e.key === 'U') ||
                        e.key === 'F12'
                    ) {
                        e.preventDefault();
                        return false;
                    }
                });
                
                document.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    return false;
                });
            }

            function multiLayerVerification() {
                const checks = [];
                
                const referrer = document.referrer.toLowerCase();
                const fromShortener = SHORTENER_DOMAINS.some(domain => referrer.includes(domain));
                checks.push(fromShortener);
                
                const urlParams = new URLSearchParams(window.location.search);
                const hasToken = urlParams.get('token') === 'auto';
                const isKeyPage = urlParams.get('page') === 'key';
                checks.push(hasToken && isKeyPage);
                
                const storedToken = sessionStorage.getItem(TOKEN_KEY);
                const storedTimestamp = sessionStorage.getItem(TIMESTAMP_KEY);
                if (storedToken && storedTimestamp) {
                    const timeDiff = Date.now() - parseInt(storedTimestamp);
                    checks.push(storedToken === 'auto' && timeDiff < 300000);
                }
                
                checks.push(sessionStorage.getItem(VERIFICATION_KEY) === 'true');
                checks.push(verifyFingerprint());
                checks.push(checkRateLimit());
                
                return checks.filter(c => c).length >= 3;
            }

            const usedNonces = new Set();
            
            function generateNonce() {
                const nonce = crypto.randomUUID ? crypto.randomUUID() : 
                    Math.random().toString(36) + Date.now().toString(36);
                usedNonces.add(nonce);
                return nonce;
            }

            function generateKey(nonce) {
                let key = KEY_PREFIX;
                const randomBytes = new Uint8Array(16);
                crypto.getRandomValues(randomBytes);
                const randomStr = Array.from(randomBytes, b => b.toString(16).padStart(2, '0')).join('');
                
                const specialPart = SPECIAL_CHARS.substring(0, Math.floor(Math.random() * 20) + 10);
                const position = Math.floor(Math.random() * 3);
                
                switch(position) {
                    case 0:
                        key += REQUIRED_WORD + specialPart + randomStr;
                        break;
                    case 1:
                        const mid = Math.floor(specialPart.length / 2);
                        key += specialPart.substring(0, mid) + REQUIRED_WORD + specialPart.substring(mid) + randomStr;
                        break;
                    case 2:
                        key += specialPart + randomStr + REQUIRED_WORD;
                        break;
                }
                
                if (!/[¡¿'\-:;₫&@#%*^+€¥$_|\\\[\]{}]/.test(key)) {
                    key += SPECIAL_CHARS.substring(0, 8);
                }
                
                const nonceHash = btoa(nonce).substring(0, 4);
                key += nonceHash;
                
                return key;
            }

            function validateKey(key) {
                if (!key || typeof key !== 'string') return false;
                if (!key.startsWith(KEY_PREFIX)) return false;
                if (!key.includes(REQUIRED_WORD)) return false;
                if (!/[¡¿'\-:;₫&@#%*^+€¥$_|\\\[\]{}]/.test(key)) return false;
                if (key.length < 35) return false;
                return true;
            }

            // ============ STORAGE ============
            function saveSecureData(keyData) {
                const nonce = generateNonce();
                const hash = generateMultiHash(keyData);
                const encoded = advancedEncode(JSON.stringify(keyData));
                
                const secureData = {
                    data: encoded,
                    hash: hash,
                    nonce: nonce,
                    timestamp: Date.now(),
                    fingerprint: generateFingerprint()
                };
                
                sessionStorage.setItem(KEY_DATA_KEY, JSON.stringify(secureData));
                sessionStorage.setItem(HASH_KEY, hash);
            }

            function getSecureData() {
                try {
                    const raw = sessionStorage.getItem(KEY_DATA_KEY);
                    if (!raw) return null;
                    
                    const secureData = JSON.parse(raw);
                    const storedHash = sessionStorage.getItem(HASH_KEY);
                    
                    if (secureData.hash !== storedHash) {
                        clearAllData();
                        return null;
                    }
                    
                    if (secureData.fingerprint !== generateFingerprint()) {
                        clearAllData();
                        return null;
                    }
                    
                    const decoded = advancedDecode(secureData.data);
                    if (!decoded) {
                        clearAllData();
                        return null;
                    }
                    
                    const keyData = JSON.parse(decoded);
                    
                    // QUAN TRỌNG: Kiểm tra hết hạn - 3 PHÚT
                    if (Date.now() - secureData.timestamp > KEY_DURATION) {
                        clearAllData();
                        return null;
                    }
                    
                    return keyData;
                } catch(e) {
                    clearAllData();
                    return null;
                }
            }

            function clearAllData() {
                const keys = Object.keys(sessionStorage);
                keys.forEach(key => {
                    if (key.includes(STORAGE_PREFIX)) {
                        sessionStorage.removeItem(key);
                    }
                });
            }

            // ============ UI ELEMENTS ============
            const mainCard = document.getElementById('mainCard');
            const brandText = document.getElementById('brandText');
            const dividerLine = document.getElementById('dividerLine');
            const subtitleText = document.getElementById('subtitleText');
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            const keyArea = document.getElementById('keyArea');
            const keyLabel = document.getElementById('keyLabel');
            const getKeyBtn = document.getElementById('getKeyBtn');
            const newKeyBtn = document.getElementById('newKeyBtn');
            const keyDisplay = document.getElementById('keyDisplay');
            const countdown = document.getElementById('countdown');
            const timerContainer = document.getElementById('timerContainer');
            const statusMessage = document.getElementById('statusMessage');
            
            let countdownInterval = null;
            let currentExpiry = null;

            // ============ COUNTDOWN ============
            function startCountdown(expiry) {
                stopCountdown();
                currentExpiry = expiry;
                
                function update() {
                    const remaining = currentExpiry - Date.now();
                    if (remaining <= 0) {
                        handleExpiry();
                        return;
                    }
                    
                    const m = Math.floor(remaining / 60000);
                    const s = Math.floor((remaining % 60000) / 1000);
                    countdown.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }
                
                update();
                countdownInterval = setInterval(update, 100);
            }

            function stopCountdown() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                currentExpiry = null;
            }

            // ============ HANDLE EXPIRY ============
            function handleExpiry() {
                stopCountdown();
                
                // Đổi key thành EXPIRED
                keyDisplay.textContent = 'EXPIRED';
                keyDisplay.classList.add('expired-key');
                keyDisplay.style.cursor = 'not-allowed';
                
                // Ẩn timer
                timerContainer.classList.add('hidden');
                
                // Đổi giao diện thành trạng thái hết hạn
                mainCard.classList.add('expired');
                brandText.classList.add('expired');
                dividerLine.classList.add('expired');
                subtitleText.classList.add('expired');
                keyArea.classList.add('expired-area');
                keyLabel.classList.add('expired-label');
                statusMessage.classList.add('expired-message');
                
                // Hiện nút GET NEW KEY
                newKeyBtn.classList.remove('hidden');
                
                // Cập nhật message
                statusMessage.textContent = 'Key has expired. Please get a new key.';
                
                // Xóa dữ liệu
                clearAllData();
            }

            // ============ RESET EXPIRED STATE ============
            function resetExpiredState() {
                mainCard.classList.remove('expired');
                brandText.classList.remove('expired');
                dividerLine.classList.remove('expired');
                subtitleText.classList.remove('expired');
                keyArea.classList.remove('expired-area');
                keyLabel.classList.remove('expired-label');
                keyDisplay.classList.remove('expired-key');
                keyDisplay.style.cursor = 'pointer';
                statusMessage.classList.remove('expired-message');
                timerContainer.classList.remove('hidden');
                newKeyBtn.classList.add('hidden');
            }

            // ============ PAGE MANAGEMENT ============
            function showPage1() {
                page1.classList.remove('hidden');
                page2.classList.add('hidden');
                stopCountdown();
                resetExpiredState();
                statusMessage.textContent = 'Click to verify and get your key';
            }

            function showPage2() {
                page1.classList.add('hidden');
                page2.classList.remove('hidden');
            }

            function displayKey(keyData) {
                resetExpiredState();
                
                keyDisplay.textContent = keyData.key;
                keyDisplay.style.opacity = '1';
                timerContainer.classList.remove('hidden');
                newKeyBtn.classList.add('hidden');
                statusMessage.textContent = 'Click on key to copy';
                showPage2();
                startCountdown(keyData.expiry);
                
                sessionStorage.setItem(VERIFICATION_KEY, 'true');
                sessionStorage.setItem(TOKEN_KEY, 'auto');
                sessionStorage.setItem(TIMESTAMP_KEY, Date.now().toString());
            }

            // ============ COPY FUNCTION ============
            keyDisplay.addEventListener('click', function() {
                const text = keyDisplay.textContent;
                if (text && text !== '-----' && text !== 'EXPIRED' && !keyDisplay.classList.contains('expired-key')) {
                    navigator.clipboard.writeText(text).then(() => {
                        showCopyNotification('Key copied successfully');
                    }).catch(() => {});
                }
            });

            function showCopyNotification(message) {
                const oldNotification = document.querySelector('.copy-notification');
                if (oldNotification) oldNotification.remove();
                
                const notification = document.createElement('div');
                notification.className = 'copy-notification';
                notification.textContent = message;
                document.body.appendChild(notification);
                
                setTimeout(() => notification.classList.add('show'), 10);
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 400);
                }, 2000);
            }

            // ============ INITIALIZATION ============
            function initialize() {
                const isVerified = multiLayerVerification();
                const secureData = getSecureData();
                
                // Kiểm tra key còn hạn không (3 phút)
                if (secureData && secureData.expiry > Date.now() && validateKey(secureData.key)) {
                    // KEY CÒN HẠN - Hiển thị key với countdown
                    displayKey(secureData);
                    
                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                    return;
                }
                
                // KEY HẾT HẠN hoặc không có key
                if (secureData && secureData.expiry <= Date.now()) {
                    // Hiển thị trạng thái hết hạn
                    clearAllData();
                    showPage2();
                    handleExpiry();
                    return;
                }
                
                // Người dùng mới hoặc chưa xác minh
                if (isVerified) {
                    // Tạo key mới
                    const nonce = generateNonce();
                    const newKey = generateKey(nonce);
                    const keyData = {
                        key: newKey,
                        expiry: Date.now() + KEY_DURATION,
                        created: Date.now(),
                        nonce: nonce
                    };
                    saveSecureData(keyData);
                    displayKey(keyData);
                    
                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } else {
                    showPage1();
                }
            }

            // ============ BUTTON HANDLERS ============
            getKeyBtn.addEventListener('click', function() {
                if (!checkRateLimit()) {
                    statusMessage.textContent = 'Too many requests. Please wait.';
                    return;
                }
                
                const nonce = generateNonce();
                const newKey = generateKey(nonce);
                const keyData = {
                    key: newKey,
                    expiry: Date.now() + KEY_DURATION,
                    created: Date.now(),
                    nonce: nonce
                };
                saveSecureData(keyData);
                
                sessionStorage.setItem(VERIFICATION_KEY, 'true');
                sessionStorage.setItem(TOKEN_KEY, 'auto');
                sessionStorage.setItem(TIMESTAMP_KEY, Date.now().toString());
                sessionStorage.setItem(FINGERPRINT_KEY, generateFingerprint());
                
                window.open(SHORTENER_URL, '_blank');
                statusMessage.textContent = 'Opening verification page...';
            });

            // NÚT GET NEW KEY - Quay về trang 1
            newKeyBtn.addEventListener('click', function() {
                clearAllData();
                stopCountdown();
                resetExpiredState();
                showPage1();
            });

            // ============ PARTICLES ============
            function createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 40; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = Math.random() * 5 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 20 + 's';
                    particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                    container.appendChild(particle);
                }
            }

            // ============ PERIODIC CHECK ============
            // Kiểm tra mỗi giây xem key đã hết hạn chưa
            setInterval(() => {
                const data = getSecureData();
                if (data && data.expiry <= Date.now() && currentExpiry) {
                    handleExpiry();
                }
                
                if (!verifyFingerprint()) {
                    clearAllData();
                    handleExpiry();
                }
            }, 1000);

            // ============ START ============
            createParticles();
            antiDebug();
            initialize();
            
            // Production mode - vô hiệu hóa console
            if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                const noop = function() {};
                console.log = noop;
                console.warn = noop;
                console.error = noop;
                console.info = noop;
                console.debug = noop;
                console.clear = noop;
            }

        })();
    </script>
</body>
