<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX HUB | Advanced Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        .watermark-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 100px,
                rgba(255,255,255,0.1) 100px,
                rgba(255,255,255,0.1) 200px
            );
        }

        .bg-aurora {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(76, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 255, 0.12) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 80%, rgba(180, 100, 255, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 100, 200, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 10% 90%, rgba(0, 255, 200, 0.05) 0%, transparent 30%);
            animation: auroraMove 15s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes auroraMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, -1%) rotate(1deg); }
            50% { transform: translate(-1%, 1%) rotate(-1deg); }
            75% { transform: translate(-2%, -0.5%) rotate(0.5deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.5), rgba(0, 180, 255, 0.4));
            border-radius: 50%;
            animation: floatParticle 20s infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.2; }
            10% { transform: translateY(-100px) translateX(30px) scale(1.8); opacity: 0.6; }
            25% { transform: translateY(-200px) translateX(-50px) scale(0.8); opacity: 0.1; }
            40% { transform: translateY(-150px) translateX(70px) scale(1.5); opacity: 0.5; }
            60% { transform: translateY(-300px) translateX(-80px) scale(0.6); opacity: 0.3; }
            80% { transform: translateY(-100px) translateX(20px) scale(1.3); opacity: 0.7; }
        }

        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 550px;
        }

        .card-wrapper {
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .card {
            background: rgba(15, 15, 30, 0.85);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.95),
                0 0 0 1px rgba(255, 255, 255, 0.06) inset,
                0 1px 0 rgba(255, 255, 255, 0.1) inset,
                0 0 120px rgba(100, 50, 255, 0.15);
            position: relative;
            overflow: hidden;
            animation: cardGlow 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .card.expired {
            border-color: rgba(255, 100, 100, 0.4);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.95),
                0 0 0 1px rgba(255, 100, 100, 0.12) inset,
                0 0 120px rgba(255, 50, 50, 0.15);
        }

        @keyframes cardGlow {
            0%, 100% { box-shadow: 0 30px 60px rgba(0, 0, 0, 0.95), 0 0 0 1px rgba(255, 255, 255, 0.06) inset, 0 0 120px rgba(100, 50, 255, 0.15); }
            50% { box-shadow: 0 30px 60px rgba(0, 0, 0, 0.95), 0 0 0 1px rgba(255, 255, 255, 0.06) inset, 0 0 180px rgba(100, 50, 255, 0.25); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(120, 80, 255, 0.15) 25%, 
                rgba(0, 180, 255, 0.15) 50%, 
                rgba(180, 100, 255, 0.15) 75%, 
                transparent 100%);
            border-radius: 33px;
            z-index: -2;
            animation: borderRotate 8s linear infinite;
        }

        .card.expired::before {
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(255, 80, 80, 0.15) 25%, 
                rgba(255, 100, 100, 0.15) 50%, 
                rgba(255, 80, 80, 0.15) 75%, 
                transparent 100%);
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fingerprint-canvas {
            position: absolute;
            left: -9999px;
            top: -9999px;
            opacity: 0;
            pointer-events: none;
        }

        .brand-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, 
                #b894f7 0%, 
                #7eb8ff 25%, 
                #c4a6ff 50%, 
                #9d7bff 75%, 
                #b894f7 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: brandShine 4s linear infinite;
            filter: drop-shadow(0 0 40px rgba(140, 100, 255, 0.7));
            transition: all 0.5s ease;
        }

        .brand.expired {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e, #ff6b6b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(255, 80, 80, 0.7));
        }

        @keyframes brandShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(180, 150, 255, 0.9), 
                transparent);
            margin: 15px auto;
            animation: dividerPulse 2s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .divider.expired {
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 100, 100, 0.9), 
                transparent);
        }

        @keyframes dividerPulse {
            0%, 100% { opacity: 0.5; width: 60px; }
            50% { opacity: 1; width: 100px; }
        }

        .subtitle {
            color: rgba(200, 200, 230, 0.6);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: subtitleFade 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .subtitle.expired {
            color: rgba(255, 150, 150, 0.8);
        }

        @keyframes subtitleFade {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .key-area {
            background: rgba(10, 10, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 25px;
            margin: 30px 0;
            text-align: center;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .key-area.expired-area {
            border-color: rgba(255, 100, 100, 0.25);
            background: rgba(25, 10, 10, 0.8);
            animation: expiredPulse 2s ease-in-out infinite;
        }

        @keyframes expiredPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 50, 50, 0.15); }
            50% { box-shadow: 0 0 40px rgba(255, 50, 50, 0.25); }
        }

        .key-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(160, 140, 255, 0.6), 
                transparent);
            animation: scanLine 4s ease-in-out infinite;
        }

        .key-area.expired-area::before {
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 100, 100, 0.6), 
                transparent);
        }

        @keyframes scanLine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .key-label {
            color: rgba(180, 170, 210, 0.7);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            transition: all 0.5s ease;
        }

        .key-label.expired-label {
            color: rgba(255, 150, 150, 0.8);
        }

        .key-value {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 1.1rem;
            color: #e8dfff;
            background: rgba(0, 0, 0, 0.5);
            padding: 18px 20px;
            border-radius: 12px;
            border: 1px solid rgba(160, 140, 220, 0.4);
            word-break: break-all;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
        }

        .key-value.expired-key {
            color: #ff6b6b;
            border-color: rgba(255, 100, 100, 0.4);
            background: rgba(25, 0, 0, 0.5);
            animation: expiredKeyGlow 1.5s ease-in-out infinite;
            cursor: not-allowed;
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes expiredKeyGlow {
            0%, 100% { border-color: rgba(255, 100, 100, 0.4); box-shadow: 0 0 10px rgba(255, 50, 50, 0.15); }
            50% { border-color: rgba(255, 100, 100, 0.7); box-shadow: 0 0 30px rgba(255, 50, 50, 0.4); }
        }

        .key-value::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(160, 140, 255, 0.06) 50%, 
                transparent 70%);
            animation: keyHighlight 3s ease-in-out infinite;
        }

        @keyframes keyHighlight {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .key-value:hover:not(.expired-key) {
            border-color: rgba(180, 160, 240, 0.7);
            box-shadow: 0 0 30px rgba(120, 80, 255, 0.25);
            transform: scale(1.02);
        }

        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
            color: #b8a9e0;
            font-size: 0.9rem;
            transition: all 0.5s ease;
        }

        .timer-container.hidden {
            display: none;
        }

        .timer {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #f0c27b, #f8a55a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: timerPulse 1s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .btn {
            width: 100%;
            padding: 18px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            background: linear-gradient(135deg, 
                rgba(50, 25, 80, 0.95), 
                rgba(30, 20, 60, 0.95));
            color: #e0d0ff;
            border: 1px solid rgba(200, 170, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            animation: btnFloat 3s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes btnFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, 
                rgba(255, 255, 255, 0.12) 0%, 
                transparent 60%);
            animation: btnRipple 3s infinite;
            z-index: -1;
        }

        @keyframes btnRipple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(200, 170, 255, 0.7);
            box-shadow: 
                0 20px 40px rgba(100, 50, 200, 0.5),
                0 0 100px rgba(120, 80, 255, 0.4);
            animation: none;
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
            transition: all 0.1s;
        }

        .btn-new-key {
            background: linear-gradient(135deg, 
                rgba(80, 25, 25, 0.95), 
                rgba(60, 20, 20, 0.95));
            border-color: rgba(255, 100, 100, 0.4);
            color: #ffcccc;
            animation: newKeyBtnPulse 2s ease-in-out infinite;
        }

        @keyframes newKeyBtnPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 50, 50, 0.25); }
            50% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 50px rgba(255, 50, 50, 0.5); }
        }

        .btn-new-key:hover {
            border-color: rgba(255, 150, 150, 0.7);
            box-shadow: 
                0 20px 40px rgba(255, 50, 50, 0.5),
                0 0 100px rgba(255, 80, 80, 0.4);
        }

        .hidden {
            display: none !important;
        }

        .status-message {
            color: #b8a0e0;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.8;
            animation: messageFade 2s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .status-message.expired-message {
            color: #ff9999;
            animation: expiredMessagePulse 2s ease-in-out infinite;
        }

        @keyframes expiredMessagePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes messageFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .copy-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(40, 20, 60, 0.97);
            color: #e0d0ff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 100;
            border: 1px solid rgba(200, 170, 255, 0.5);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .anti-screenshot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.001);
            pointer-events: none;
            z-index: 9998;
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
                border-radius: 24px;
            }
            .brand {
                font-size: 2.2rem;
            }
            .key-value {
                font-size: 0.9rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="watermark-layer" id="watermarkLayer"></div>
    <canvas class="fingerprint-canvas" id="fpCanvas" width="200" height="50"></canvas>
    <div class="anti-screenshot" id="antiScreenshot"></div>

    <div class="bg-aurora"></div>
    <div class="grid-lines"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card-wrapper">
            <div class="card" id="mainCard">
                <div class="brand-container">
                    <div class="brand" id="brandText">APEX HUB</div>
                    <div class="divider" id="dividerLine"></div>

                <div id="page1">

                        <div class="key-label">YOUR LICENSE KEY</div>

                    <button class="btn" id="getKeyBtn">GET KEY</button>
                    <div class="status-message">Multi-layer verification required</div>
                </div>

                <div id="page2" class="hidden">
                    <div class="key-area" id="keyArea">

                            <span>Time remaining</span>
                            <span class="timer" id="countdown">03:00</span>
                        </div>
                    </div>
                    <button class="btn btn-new-key hidden" id="newKeyBtn">GET NEW KEY</button>
                    <div class="status-message" id="statusMessage"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ CONFIGURATION ============
            const SHORTENER_URL = 'https://link4m.org/hXPIjdW';
            const SHORTENER_DOMAINS = ['link4m.org', 'link4m.net', 'link4m.com', 'link4m'];
            const KEY_PREFIX = 'Free_';
            const REQUIRED_WORD = 'apex';
            const SPECIAL_CHARS = 'qptoeugjwmxnalkjf¡¿\'-:;₫&@9275023#%*^+€¥$_|\\[]{}bcz';
            // 🔧 THAY ĐỔI: 3 phút = 180000ms
            const KEY_DURATION = 3 * 60 * 1000; // 3 phút để test
            
            const STORAGE_PREFIX = btoa(unescape(encodeURIComponent('apex_hub_v2_'))).substring(0, 10);
            const KEY_DATA_KEY = STORAGE_PREFIX + '_kd';
            const VERIFICATION_KEY = STORAGE_PREFIX + '_vf';
            const TIMESTAMP_KEY = STORAGE_PREFIX + '_ts';
            const TOKEN_KEY = STORAGE_PREFIX + '_tk';
            const HASH_KEY = STORAGE_PREFIX + '_hs';
            const COUNTER_KEY = STORAGE_PREFIX + '_ct';
            const FINGERPRINT_KEY = STORAGE_PREFIX + '_fp';
            const CANVAS_FP_KEY = STORAGE_PREFIX + '_cfp';
            const SESSION_ID_KEY = STORAGE_PREFIX + '_sid';
            const INTEGRITY_KEY = STORAGE_PREFIX + '_int';

            function generateCanvasFingerprint() {
                try {
                    const canvas = document.getElementById('fpCanvas');
                    const ctx = canvas.getContext('2d');
                    ctx.textBaseline = 'top';
                    ctx.font = '14px "Segoe UI"';
                    ctx.textBaseline = 'alphabetic';
                    ctx.fillStyle = '#f60';
                    ctx.fillRect(125, 1, 62, 20);
                    ctx.fillStyle = '#069';
                    ctx.font = '12px "Arial"';
                    ctx.fillText('APEX🔒HUB', 2, 15);
                    ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                    ctx.font = '10px "Times New Roman"';
                    ctx.fillText('Security', 4, 35);
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.fillStyle = 'rgb(255,0,255)';
                    ctx.beginPath();
                    ctx.arc(50, 25, 10, 0, Math.PI * 2);
                    ctx.fill();
                    return canvas.toDataURL();
                } catch(e) {
                    return 'fp_error_' + Date.now();
                }
            }

            function verifyCanvasFingerprint() {
                const stored = sessionStorage.getItem(CANVAS_FP_KEY);
                const current = generateCanvasFingerprint();
                if (!stored) {
                    sessionStorage.setItem(CANVAS_FP_KEY, current);
                    return true;
                }
                return stored === current;
            }

            function generateSessionId() {
                const components = [
                    Date.now().toString(36),
                    Math.random().toString(36).substring(2),
                    navigator.userAgent.length.toString(36),
                    screen.width.toString(36),
                    screen.height.toString(36)
                ];
                return components.join('-');
            }

            function calculateIntegrity() {
                const elements = [
                    document.getElementById('mainCard').innerHTML.length,
                    document.getElementById('brandText').textContent,
                    document.querySelectorAll('.particle').length,
                    window.innerWidth,
                    window.innerHeight
                ];
                return btoa(elements.join('|')).substring(0, 16);
            }

            function verifyIntegrity() {
                const stored = sessionStorage.getItem(INTEGRITY_KEY);
                const current = calculateIntegrity();
                if (!stored) {
                    sessionStorage.setItem(INTEGRITY_KEY, current);
                    return true;
                }
                return stored === current;
            }

            function generateFingerprint() {
                const components = [
                    navigator.userAgent,
                    navigator.language,
                    screen.colorDepth,
                    screen.width + 'x' + screen.height,
                    new Date().getTimezoneOffset(),
                    !!window.sessionStorage,
                    !!window.localStorage,
                    navigator.hardwareConcurrency || 'unknown',
                    navigator.deviceMemory || 'unknown',
                    navigator.platform || 'unknown',
                    new Date().getFullYear(),
                    screen.availWidth,
                    screen.availHeight,
                    screen.pixelDepth,
                    navigator.maxTouchPoints || 0
                ];
                return btoa(components.join('|||')).substring(0, 40);
            }

            function verifyFingerprint() {
                const stored = sessionStorage.getItem(FINGERPRINT_KEY);
                const current = generateFingerprint();
                if (!stored) {
                    sessionStorage.setItem(FINGERPRINT_KEY, current);
                    return true;
                }
                return stored === current;
            }

            function checkRateLimit() {
                const counter = parseInt(sessionStorage.getItem(COUNTER_KEY) || '0');
                if (counter > 8) {
                    clearAllData();
                    return false;
                }
                sessionStorage.setItem(COUNTER_KEY, (counter + 1).toString());
                return true;
            }

            function advancedEncode(str) {
                let result = str;
                result = btoa(unescape(encodeURIComponent(result)));
                const salt = Date.now().toString(36);
                let xored = '';
                for (let i = 0; i < result.length; i++) {
                    xored += String.fromCharCode(result.charCodeAt(i) ^ salt.charCodeAt(i % salt.length));
                }
                return salt + '.' + btoa(xored).split('').reverse().join('');
            }

            function advancedDecode(str) {
                try {
                    const parts = str.split('.');
                    if (parts.length !== 2) return null;
                    const salt = parts[0];
                    const reversed = parts[1].split('').reverse().join('');
                    const xored = atob(reversed);
                    let result = '';
                    for (let i = 0; i < xored.length; i++) {
                        result += String.fromCharCode(xored.charCodeAt(i) ^ salt.charCodeAt(i % salt.length));
                    }
                    return decodeURIComponent(escape(atob(result)));
                } catch(e) {
                    return null;
                }
            }

            function generateMultiHash(data) {
                let hash1 = 0;
                let hash2 = 0;
                let hash3 = 0;
                const str = JSON.stringify(data);
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash1 = ((hash1 << 5) - hash1) + char;
                    hash1 = hash1 & hash1;
                    hash2 = ((hash2 << 7) - hash2) + char;
                    hash2 = hash2 & hash2;
                    hash3 = ((hash3 << 3) - hash3) + char;
                    hash3 = hash3 & hash3;
                }
                return Math.abs(hash1).toString(36) + '_' + 
                       Math.abs(hash2).toString(36) + '_' + 
                       Math.abs(hash3).toString(36);
            }

            function antiDebug() {
                let devtoolsOpen = false;
                let warningCount = 0;
                
                const detectDevTools = () => {
                    const threshold = 160;
                    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                    const startTime = Date.now();
                    debugger;
                    const endTime = Date.now();
                    const debuggerDetected = endTime - startTime > 100;
                    
                    if (widthThreshold || heightThreshold || debuggerDetected) {
                        if (!devtoolsOpen) {
                            devtoolsOpen = true;
                            warningCount++;
                            console.clear();
                            if (warningCount >= 2) {
                                clearAllData();
                                location.reload();
                            }
                        }
                    } else {
                        devtoolsOpen = false;
                    }
                };
                
                setInterval(detectDevTools, 500);
                
                document.addEventListener('keydown', function(e) {
                    const blockedKeys = [
                        { ctrl: true, shift: true, key: 'I' },
                        { ctrl: true, shift: true, key: 'J' },
                        { ctrl: true, shift: true, key: 'C' },
                        { ctrl: true, key: 'U' },
                        { ctrl: true, key: 'S' },
                        { key: 'F12' }
                    ];
                    
                    const isBlocked = blockedKeys.some(combo => {
                        return Object.keys(combo).every(k => {
                            if (k === 'key') return e.key === combo[k];
                            return e[k] === combo[k];
                        });
                    });
                    
                    if (isBlocked) {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }
                }, true);
                
                document.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    return false;
                }, true);
                
                document.addEventListener('copy', function(e) {
                    if (!e.target.classList.contains('key-value') || 
                        e.target.classList.contains('expired-key')) {
                        e.preventDefault();
                    }
                });
                
                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.type === 'attributes' && 
                            mutation.target.id === 'keyDisplay') {
                            clearAllData();
                            handleExpiry();
                        }
                    });
                });
                
                const keyDisplay = document.getElementById('keyDisplay');
                if (keyDisplay) {
                    observer.observe(keyDisplay, { 
                        attributes: true, 
                        childList: true, 
                        characterData: true 
                    });
                }
            }

            function multiLayerVerification() {
                const checks = [];
                let score = 0;
                
                const referrer = document.referrer.toLowerCase();
                const fromShortener = SHORTENER_DOMAINS.some(domain => referrer.includes(domain));
                checks.push({ passed: fromShortener, weight: 3 });
                
                const urlParams = new URLSearchParams(window.location.search);
                const hasToken = urlParams.get('token') === 'auto';
                const isKeyPage = urlParams.get('page') === 'key';
                checks.push({ passed: hasToken && isKeyPage, weight: 3 });
                
                const storedToken = sessionStorage.getItem(TOKEN_KEY);
                const storedTimestamp = sessionStorage.getItem(TIMESTAMP_KEY);
                if (storedToken && storedTimestamp) {
                    const timeDiff = Date.now() - parseInt(storedTimestamp);
                    checks.push({ passed: storedToken === 'auto' && timeDiff < 60000, weight: 2 });
                }
                
                checks.push({ passed: sessionStorage.getItem(VERIFICATION_KEY) === 'true', weight: 2 });
                checks.push({ passed: verifyFingerprint(), weight: 2 });
                checks.push({ passed: verifyCanvasFingerprint(), weight: 1 });
                checks.push({ passed: checkRateLimit(), weight: 1 });
                checks.push({ passed: verifyIntegrity(), weight: 1 });
                
                const sessionId = sessionStorage.getItem(SESSION_ID_KEY);
                checks.push({ passed: !!sessionId, weight: 1 });
                
                checks.forEach(check => {
                    if (check.passed) score += check.weight;
                });
                
                return score >= 8;
            }

            const usedNonces = new Set();
            
            function generateNonce() {
                const nonce = crypto.randomUUID ? crypto.randomUUID() : 
                    Math.random().toString(36) + Date.now().toString(36) + 
                    Math.random().toString(36);
                usedNonces.add(nonce);
                if (usedNonces.size > 100) {
                    const iterator = usedNonces.values();
                    usedNonces.delete(iterator.next().value);
                }
                return nonce;
            }

            function generateKey(nonce) {
                let key = KEY_PREFIX;
                const randomBytes = new Uint8Array(24);
                crypto.getRandomValues(randomBytes);
                const randomStr = Array.from(randomBytes, b => b.toString(16).padStart(2, '0')).join('');
                const specialPart = SPECIAL_CHARS.substring(0, Math.floor(Math.random() * 25) + 15);
                const shuffledSpecial = specialPart.split('').sort(() => Math.random() - 0.5).join('');
                const position = Math.floor(Math.random() * 4);
                
                switch(position) {
                    case 0:
                        key += REQUIRED_WORD + shuffledSpecial + randomStr;
                        break;
                    case 1:
                        const mid = Math.floor(shuffledSpecial.length / 2);
                        key += shuffledSpecial.substring(0, mid) + REQUIRED_WORD + 
                               shuffledSpecial.substring(mid) + randomStr;
                        break;
                    case 2:
                        key += shuffledSpecial + randomStr + REQUIRED_WORD;
                        break;
                    case 3:
                        const pos = Math.floor(Math.random() * randomStr.length);
                        key += shuffledSpecial + randomStr.substring(0, pos) + 
                               REQUIRED_WORD + randomStr.substring(pos);
                        break;
                }
                
                if (!/[¡¿'\-:;₫&@#%*^+€¥$_|\\\[\]{}]/.test(key)) {
                    key += SPECIAL_CHARS.substring(0, 10);
                }
                
                const nonceHash = btoa(nonce).substring(0, 6);
                key += nonceHash;
                
                return key;
            }

            function validateKey(key) {
                if (!key || typeof key !== 'string') return false;
                if (!key.startsWith(KEY_PREFIX)) return false;
                if (!key.includes(REQUIRED_WORD)) return false;
                if (!/[¡¿'\-:;₫&@#%*^+€¥$_|\\\[\]{}]/.test(key)) return false;
                if (key.length < 40) return false;
                const suspiciousPatterns = ['script', 'alert', 'eval', 'http', 'www.'];
                if (suspiciousPatterns.some(p => key.toLowerCase().includes(p))) return false;
                return true;
            }

            function saveSecureData(keyData) {
                const nonce = generateNonce();
                const hash = generateMultiHash(keyData);
                const encoded = advancedEncode(JSON.stringify(keyData));
                const integrityHash = calculateIntegrity();
                
                const secureData = {
                    data: encoded,
                    hash: hash,
                    nonce: nonce,
                    timestamp: Date.now(),
                    fingerprint: generateFingerprint(),
                    canvasFp: generateCanvasFingerprint(),
                    integrity: integrityHash,
                    sessionId: sessionStorage.getItem(SESSION_ID_KEY)
                };
                
                sessionStorage.setItem(KEY_DATA_KEY, JSON.stringify(secureData));
                sessionStorage.setItem(HASH_KEY, hash);
                sessionStorage.setItem(INTEGRITY_KEY, integrityHash);
            }

            function getSecureData() {
                try {
                    const raw = sessionStorage.getItem(KEY_DATA_KEY);
                    if (!raw) return null;
                    
                    const secureData = JSON.parse(raw);
                    
                    const checks = [
                        secureData.hash === sessionStorage.getItem(HASH_KEY),
                        secureData.fingerprint === generateFingerprint(),
                        secureData.canvasFp === generateCanvasFingerprint(),
                        secureData.integrity === calculateIntegrity(),
                        secureData.sessionId === sessionStorage.getItem(SESSION_ID_KEY),
                        verifyFingerprint(),
                        verifyCanvasFingerprint(),
                        verifyIntegrity()
                    ];
                    
                    if (checks.some(check => !check)) {
                        clearAllData();
                        return null;
                    }
                    
                    const decoded = advancedDecode(secureData.data);
                    if (!decoded) {
                        clearAllData();
                        return null;
                    }
                    
                    const keyData = JSON.parse(decoded);
                    
                    // 🔧 KIỂM TRA HẾT HẠN VỚI 3 PHÚT
                    if (Date.now() - secureData.timestamp > KEY_DURATION) {
                        clearAllData();
                        return null;
                    }
                    
                    return keyData;
                } catch(e) {
                    clearAllData();
                    return null;
                }
            }

            function clearAllData() {
                const keys = Object.keys(sessionStorage);
                keys.forEach(key => {
                    if (key.includes(STORAGE_PREFIX)) {
                        sessionStorage.removeItem(key);
                    }
                });
                usedNonces.clear();
            }

            // ============ UI ELEMENTS ============
            const mainCard = document.getElementById('mainCard');
            const brandText = document.getElementById('brandText');
            const dividerLine = document.getElementById('dividerLine');
            const subtitleText = document.getElementById('subtitleText');
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            const keyArea = document.getElementById('keyArea');
            const keyLabel = document.getElementById('keyLabel');
            const getKeyBtn = document.getElementById('getKeyBtn');
            const newKeyBtn = document.getElementById('newKeyBtn');
            const keyDisplay = document.getElementById('keyDisplay');
            const countdown = document.getElementById('countdown');
            const timerContainer = document.getElementById('timerContainer');
            const statusMessage = document.getElementById('statusMessage');
            
            let countdownInterval = null;
            let currentExpiry = null;
            let autoRedirectInterval = null; // 🔧 THÊM: Interval cho tự động chuyển trang

            // ============ COUNTDOWN ============
            function startCountdown(expiry) {
                stopCountdown();
                currentExpiry = expiry;
                
                function update() {
                    const remaining = currentExpiry - Date.now();
                    if (remaining <= 0) {
                        handleExpiry();
                        return;
                    }
                    
                    const m = Math.floor(remaining / 60000);
                    const s = Math.floor((remaining % 60000) / 1000);
                    countdown.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    
                    // 🔧 Cảnh báo khi còn 30 giây
                    if (remaining < 30000) {
                        countdown.style.color = '#ff6b6b';
                        countdown.style.animation = 'timerPulse 0.5s ease-in-out infinite';
                    }
                }
                
                update();
                countdownInterval = setInterval(update, 1000);
            }

            function stopCountdown() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                currentExpiry = null;
                countdown.style.color = '';
                countdown.style.animation = 'timerPulse 1s ease-in-out infinite';
            }

            // 🔧 HANDLE EXPIRY - TỰ ĐỘNG CHUYỂN VỀ TRANG 1 SAU 5 GIÂY
            function handleExpiry() {
                stopCountdown();
                
                // Xóa interval tự động cũ nếu có
                if (autoRedirectInterval) {
                    clearInterval(autoRedirectInterval);
                }
                
                // Hiển thị trạng thái hết hạn
                keyDisplay.textContent = 'EXPIRED';
                keyDisplay.classList.add('expired-key');
                keyDisplay.style.cursor = 'not-allowed';
                timerContainer.classList.add('hidden');
                
                mainCard.classList.add('expired');
                brandText.classList.add('expired');
                dividerLine.classList.add('expired');
                subtitleText.classList.add('expired');
                keyArea.classList.add('expired-area');
                keyLabel.classList.add('expired-label');
                statusMessage.classList.add('expired-message');
                
                // Ẩn nút GET NEW KEY (tự động chuyển)
                newKeyBtn.classList.add('hidden');
                
                // Xóa dữ liệu
                clearAllData();
                
                // 🔧 TỰ ĐỘNG CHUYỂN VỀ TRANG 1 SAU 5 GIÂY
                let secondsLeft = 5;
                statusMessage.textContent = `⏰ Key expired! Auto-redirect to page 1 in ${secondsLeft}s...`;
                
                autoRedirectInterval = setInterval(() => {
                    secondsLeft--;
                    if (secondsLeft <= 0) {
                        clearInterval(autoRedirectInterval);
                        autoRedirectInterval = null;
                        // Chuyển về trang 1
                        resetExpiredState();
                        showPage1();
                        statusMessage.textContent = 'Multi-layer verification required';
                    } else {
                        statusMessage.textContent = `⏰ Key expired! Auto-redirect to page 1 in ${secondsLeft}s...`;
                    }
                }, 1000);
            }

            function resetExpiredState() {
                // Xóa auto redirect interval nếu đang chạy
                if (autoRedirectInterval) {
                    clearInterval(autoRedirectInterval);
                    autoRedirectInterval = null;
                }
                
                mainCard.classList.remove('expired');
                brandText.classList.remove('expired');
                dividerLine.classList.remove('expired');
                subtitleText.classList.remove('expired');
                keyArea.classList.remove('expired-area');
                keyLabel.classList.remove('expired-label');
                keyDisplay.classList.remove('expired-key');
                keyDisplay.style.cursor = 'pointer';
                statusMessage.classList.remove('expired-message');
                timerContainer.classList.remove('hidden');
                newKeyBtn.classList.add('hidden');
                countdown.textContent = '03:00';
                countdown.style.color = '';
                countdown.style.animation = 'timerPulse 1s ease-in-out infinite';
            }

            function showPage1() {
                page1.classList.remove('hidden');
                page2.classList.add('hidden');
                stopCountdown();
                resetExpiredState();
                keyDisplay.textContent = '-----';
                keyDisplay.style.opacity = '0.5';
            }

            function showPage2() {
                page1.classList.add('hidden');
                page2.classList.remove('hidden');
            }

            function displayKey(keyData) {
                resetExpiredState();
                
                keyDisplay.textContent = keyData.key;
                keyDisplay.style.opacity = '1';
                timerContainer.classList.remove('hidden');
                newKeyBtn.classList.add('hidden');
                statusMessage.textContent = '✅ Click on key to copy';
                showPage2();
                startCountdown(keyData.expiry);
                
                sessionStorage.setItem(VERIFICATION_KEY, 'true');
                sessionStorage.setItem(TOKEN_KEY, 'auto');
                sessionStorage.setItem(TIMESTAMP_KEY, Date.now().toString());
                sessionStorage.setItem(SESSION_ID_KEY, generateSessionId());
            }

            // ============ COPY FUNCTION ============
            keyDisplay.addEventListener('click', function(e) {
                const text = keyDisplay.textContent;
                if (text && text !== '-----' && text !== 'EXPIRED' && !keyDisplay.classList.contains('expired-key')) {
                    if (e.pointerType === 'mouse' || e.pointerType === 'touch') {
                        navigator.clipboard.writeText(text).then(() => {
                            showCopyNotification('✅ Key copied successfully!');
                        }).catch(() => {
                            showCopyNotification('❌ Failed to copy key');
                        });
                    }
                }
            });

            function showCopyNotification(message) {
                const oldNotification = document.querySelector('.copy-notification');
                if (oldNotification) oldNotification.remove();
                
                const notification = document.createElement('div');
                notification.className = 'copy-notification';
                notification.textContent = message;
                document.body.appendChild(notification);
                
                setTimeout(() => notification.classList.add('show'), 10);
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 400);
                }, 2000);
            }

            // ============ INITIALIZATION ============
            function initialize() {
                if (!sessionStorage.getItem(SESSION_ID_KEY)) {
                    sessionStorage.setItem(SESSION_ID_KEY, generateSessionId());
                }
                if (!sessionStorage.getItem(CANVAS_FP_KEY)) {
                    sessionStorage.setItem(CANVAS_FP_KEY, generateCanvasFingerprint());
                }
                if (!sessionStorage.getItem(INTEGRITY_KEY)) {
                    sessionStorage.setItem(INTEGRITY_KEY, calculateIntegrity());
                }
                
                const isVerified = multiLayerVerification();
                const secureData = getSecureData();
                
                // 🔧 KIỂM TRA KEY CÒN HẠN (3 PHÚT)
                if (secureData && secureData.expiry > Date.now() && validateKey(secureData.key)) {
                    displayKey(secureData);
                    
                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                    return;
                }
                
                // 🔧 KEY HẾT HẠN
                if (secureData && secureData.expiry <= Date.now()) {
                    clearAllData();
                    showPage2();
                    handleExpiry();
                    return;
                }
                
                // 🔧 TẠO KEY MỚI
                if (isVerified) {
                    const nonce = generateNonce();
                    const newKey = generateKey(nonce);
                    const keyData = {
                        key: newKey,
                        expiry: Date.now() + KEY_DURATION,
                        created: Date.now(),
                        nonce: nonce
                    };
                    saveSecureData(keyData);
                    displayKey(keyData);
                    
                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } else {
                    showPage1();
                }
            }

            // ============ BUTTON HANDLERS ============
            getKeyBtn.addEventListener('click', function() {
                if (!checkRateLimit()) {
                    statusMessage.textContent = '⚠️ Security limit exceeded. Please wait.';
                    return;
                }
                
                if (!verifyFingerprint() || !verifyCanvasFingerprint()) {
                    statusMessage.textContent = '❌ Security verification failed.';
                    clearAllData();
                    return;
                }
                
                const nonce = generateNonce();
                const newKey = generateKey(nonce);
                const keyData = {
                    key: newKey,
                    expiry: Date.now() + KEY_DURATION,
                    created: Date.now(),
                    nonce: nonce
                };
                saveSecureData(keyData);
                
                sessionStorage.setItem(VERIFICATION_KEY, 'true');
                sessionStorage.setItem(TOKEN_KEY, 'auto');
                sessionStorage.setItem(TIMESTAMP_KEY, Date.now().toString());
                sessionStorage.setItem(FINGERPRINT_KEY, generateFingerprint());
                sessionStorage.setItem(CANVAS_FP_KEY, generateCanvasFingerprint());
                sessionStorage.setItem(SESSION_ID_KEY, generateSessionId());
                sessionStorage.setItem(INTEGRITY_KEY, calculateIntegrity());
                
                window.open(SHORTENER_URL, '_blank');
                statusMessage.textContent = '🔗 Opening verification page...';
            });

            // 🔧 NÚT GET NEW KEY (thủ công)
            newKeyBtn.addEventListener('click', function() {
                // Xóa auto redirect nếu đang chạy
                if (autoRedirectInterval) {
                    clearInterval(autoRedirectInterval);
                    autoRedirectInterval = null;
                }
                clearAllData();
                stopCountdown();
                resetExpiredState();
                showPage1();
                statusMessage.textContent = 'Multi-layer verification required';
            });

            // ============ PARTICLES ============
            function createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 40; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = Math.random() * 5 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 20 + 's';
                    particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                    container.appendChild(particle);
                }
            }

            // ============ PERIODIC SECURITY CHECKS ============
            setInterval(() => {
                const data = getSecureData();
                if (data && data.expiry <= Date.now() && currentExpiry) {
                    handleExpiry();
                }
                
                if (!verifyFingerprint() || !verifyCanvasFingerprint() || !verifyIntegrity()) {
                    clearAllData();
                    handleExpiry();
                }
                
                sessionStorage.setItem(INTEGRITY_KEY, calculateIntegrity());
            }, 3000);

            // ============ ANTI-SCREENSHOT PROTECTION ============
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    keyDisplay.style.filter = 'blur(5px)';
                } else {
                    keyDisplay.style.filter = 'none';
                }
            });

            // ============ START ============
            createParticles();
            antiDebug();
            initialize();
            
            if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                const methods = ['log', 'warn', 'error', 'info', 'debug', 'clear', 'table', 'trace', 'dir', 'group', 'groupEnd'];
                methods.forEach(method => {
                    console[method] = function() {};
                });
                console.time = function() {};
                console.timeEnd = function() {};
                console.toString = function() { return 'function console() { [native code] }'; };
            }

        })();
    </script>
