<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX HUB | Your Key</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #050505;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(180, 0, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 0, 0, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(255, 50, 50, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(180, 0, 0, 0.1) 0%, transparent 50%);
            z-index: 0;
        }
        .container { position: relative; z-index: 2; width: 100%; max-width: 520px; padding: 20px; }
        .card {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(230, 57, 70, 0.3);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 0 80px rgba(220, 20, 20, 0.1), 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative; overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            background: conic-gradient(from 0deg, transparent, rgba(220, 20, 20, 0.05), transparent, rgba(255, 80, 80, 0.08), transparent);
            animation: rotateGlow 15s linear infinite; z-index: 0;
        }
        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .card-content { position: relative; z-index: 1; }
        .logo-text { font-size: 48px; font-weight: 700; letter-spacing: 6px; color: #fff; text-shadow: 0 0 40px rgba(255, 50, 50, 0.3); }
        .logo-text span { color: #e63946; text-shadow: 0 0 60px rgba(230, 57, 70, 0.6); }
        .logo-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 8px; text-transform: uppercase; margin-bottom: 40px; }
        .divider { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, #e63946, transparent); margin: 0 auto 35px; }
        .page-title { font-size: 22px; color: #ccc; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; }
        .page-subtitle { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 3px; margin-bottom: 40px; }
        .key-box { margin-top: 35px; padding: 22px 20px; background: rgba(0,0,0,0.6); border: 1px solid rgba(230,57,70,0.25); border-radius: 16px; }
        .key-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 3px; margin-bottom: 10px; }
        .key-value { font-family: 'Courier New', monospace; font-size: 13px; color: #e63946; word-break: break-all; }
        .countdown-timer { margin-top: 8px; margin-bottom: 30px; font-size: 14px; font-weight: 500; color: #e63946; letter-spacing: 2px; }
        .btn-get-key {
            display: inline-block; padding: 16px 55px; font-size: 15px; font-weight: 500;
            letter-spacing: 4px; text-transform: uppercase; color: #fff;
            background: linear-gradient(135deg, #1a0000 0%, #2d0000 50%, #1a0000 100%);
            border: 1px solid rgba(230,57,70,0.5); border-radius: 50px; cursor: pointer;
            transition: all 0.5s;
        }
        .btn-get-key:hover { border-color: #e63946; box-shadow: 0 0 30px rgba(230,57,70,0.3); transform: translateY(-3px); }
        .hidden { display: none !important; }
        .error-text { color: #ff4444; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="card">
            <div class="card-content">
                <div class="logo-text">APEX <span>HUB</span></div>
                <div class="logo-subtitle">Premium Access</div>
                <div class="divider"></div>

                <div id="generateSection">
                    <div class="page-title">Generate Key</div>
                    <div class="page-subtitle">Key được tạo bởi server bảo mật</div>
                    <button class="btn-get-key" onclick="createKeyFromServer()">
                        <span>Tạo Key</span>
                    </button>
                    <p class="error-text hidden" id="errorMsg"></p>
                </div>

                <div id="keySection" class="hidden">
                    <div class="page-title">Your Key</div>
                    <div class="page-subtitle">Được tạo bởi APEX HUB Server</div>
                    <div class="key-box">
                        <div class="key-label">KEY</div>
                        <div class="key-value" id="keyDisplay"></div>
                    </div>
                    <p style="color:#888;font-size:11px;margin-top:15px;" id="expiryText"></p>
                    <div class="countdown-timer" id="countdown"></div>
                    <button class="btn-get-key" onclick="window.location.href='/'">
                        <span>Get New Key</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CLIENT CHỈ GỌI API - KHÔNG BIẾT CÁCH SINH KEY
        const API_URL = '/api/create-key';
        
        async function createKeyFromServer() {
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('errorMsg').textContent = 'Đang kết nối server...';
            document.getElementById('errorMsg').classList.remove('hidden');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showKey(data);
                } else {
                    document.getElementById('errorMsg').textContent = '❌ ' + data.error;
                    document.getElementById('errorMsg').classList.remove('hidden');
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = '❌ Lỗi kết nối server!';
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        }
        
        function showKey(data) {
            document.getElementById('generateSection').classList.add('hidden');
            document.getElementById('keySection').classList.remove('hidden');
            document.getElementById('keyDisplay').textContent = data.key;
            document.getElementById('expiryText').textContent = 'Key hết hạn sau ' + data.expiresInMin + ' phút';
            
            // Đếm ngược
            const expiresAt = data.expiresAt;
            setInterval(() => {
                const dist = expiresAt - Date.now();
                if (dist <= 0) {
                    document.getElementById('countdown').textContent = 'ĐÃ HẾT HẠN';
                    return;
                }
                const m = Math.floor(dist / 60000);
                const s = Math.floor((dist % 60000) / 1000);
                document.getElementById('countdown').textContent = `Còn lại: ${m}m ${s}s`;
            }, 1000);
        }
    </script>
</body>
</html>
