<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX HUB | Your Key</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #050505;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(180, 0, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 0, 0, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(255, 50, 50, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(180, 0, 0, 0.1) 0%, transparent 50%);
            z-index: 0;
        }

        .grid-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .particle {
            position: absolute; border-radius: 50%;
            animation: floatUp 8s infinite ease-in;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(100px) scale(1); opacity: 0; }
        }

        .container { position: relative; z-index: 2; width: 100%; max-width: 520px; padding: 20px; }

        .card {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(230, 57, 70, 0.2);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 0 80px rgba(220, 20, 20, 0.08), 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            position: relative; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card::before {
            content: '';
            position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            background: conic-gradient(from 0deg, transparent, rgba(220, 20, 20, 0.05), transparent, rgba(255, 80, 80, 0.08), transparent, rgba(220, 20, 20, 0.05), transparent);
            animation: rotateGlow 15s linear infinite;
            z-index: 0;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .card::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 50%, rgba(0, 0, 0, 0.3) 100%);
            z-index: 0; pointer-events: none;
        }

        .card-content { position: relative; z-index: 1; }

        .logo-text {
            font-size: 48px; font-weight: 700;
            letter-spacing: 6px; color: #ffffff;
            margin-bottom: 5px;
            animation: fadeInUp 0.8s ease-out;
            text-shadow: 0 0 40px rgba(255, 50, 50, 0.3);
        }

        .logo-text span { color: #e63946; text-shadow: 0 0 60px rgba(230, 57, 70, 0.6); }

        .logo-subtitle {
            font-size: 13px; font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 8px; text-transform: uppercase;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.15s both;
        }

        .divider {
            width: 80px; height: 2px;
            background: linear-gradient(90deg, transparent, #e63946, transparent);
            margin: 0 auto 35px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .page-title {
            font-size: 22px; font-weight: 400;
            color: #cccccc; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 8px;
            animation: fadeInUp 0.8s ease-out 0.35s both;
        }

        .page-subtitle {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 3px; margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .key-box {
            margin-top: 35px; padding: 22px 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(230, 57, 70, 0.25);
            border-radius: 16px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .key-label {
            font-size: 10px; color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 10px;
        }

        .key-value {
            font-family: 'Courier New', monospace;
            font-size: 13px; color: #e63946;
            word-break: break-all; letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
        }

        .expiry-text {
            margin-top: 15px;
            font-size: 11px; color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        .countdown-timer {
            margin-top: 8px; margin-bottom: 30px;
            font-size: 14px; font-weight: 500;
            color: #e63946; letter-spacing: 2px;
            animation: fadeInUp 0.8s ease-out 0.55s both;
            text-shadow: 0 0 15px rgba(230, 57, 70, 0.5);
        }

        .countdown-timer.expired {
            color: #ff3333;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .btn-get-key, .btn-generate {
            position: relative;
            display: inline-block;
            padding: 16px 55px;
            font-size: 15px; font-weight: 500;
            letter-spacing: 4px; text-transform: uppercase;
            color: #ffffff;
            background: linear-gradient(135deg, #1a0000 0%, #2d0000 50%, #1a0000 100%);
            border: 1px solid rgba(230, 57, 70, 0.5);
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.8s ease-out 0.6s both;
            z-index: 1;
        }

        .btn-get-key::before, .btn-generate::before {
            content: '';
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(230, 57, 70, 0.25);
            transform: translate(-50%, -50%);
            transition: width 0.7s, height 0.7s;
        }

        .btn-get-key:hover::before, .btn-generate:hover::before { width: 400px; height: 400px; }

        .btn-get-key:hover, .btn-generate:hover {
            border-color: #e63946;
            box-shadow: 0 0 30px rgba(230, 57, 70, 0.3), 0 0 60px rgba(230, 57, 70, 0.15), 0 15px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(-3px);
            letter-spacing: 6px;
        }

        .btn-get-key:active, .btn-generate:active { transform: translateY(-1px); transition: all 0.1s; }

        .btn-text { position: relative; z-index: 1; }

        .card-glow {
            position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 26px;
            background: linear-gradient(45deg, transparent 40%, rgba(230, 57, 70, 0.15) 50%, transparent 60%);
            z-index: -1;
            animation: borderGlow 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .corner-accent {
            position: absolute; width: 30px; height: 30px;
            border-color: rgba(230, 57, 70, 0.4);
            border-style: solid;
            z-index: 2; pointer-events: none;
        }

        .corner-accent.top-left { top: 15px; left: 15px; border-width: 1px 0 0 1px; border-radius: 6px 0 0 0; }
        .corner-accent.bottom-right { bottom: 15px; right: 15px; border-width: 0 1px 1px 0; border-radius: 0 0 6px 0; }

        .hidden { display: none !important; }
        .error-text { color: #ff4444; font-size: 14px; letter-spacing: 2px; margin-top: 20px; }
        
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid rgba(230, 57, 70, 0.3);
            border-top: 2px solid #e63946;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="grid-pattern"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card">
            <div class="card-glow"></div>
            <div class="corner-accent top-left"></div>
            <div class="corner-accent bottom-right"></div>

            <div class="card-content">
                <div class="logo-text">APEX <span>HUB</span></div>
                <div class="logo-subtitle">Premium Access</div>
                <div class="divider"></div>

                <!-- Loading -->
                <div id="loadingSection">
                    <div class="page-title"><span class="loading-spinner"></span>Checking...</div>
                    <div class="page-subtitle">Please wait</div>
                </div>

                <!-- Khu vực tạo key -->
                <div id="generateSection" class="hidden">
                    <div class="page-title">Generate Key</div>
                    <div class="page-subtitle">Click to create your key</div>
                    <button class="btn-generate" id="btnGenerate" onclick="generateAndShowKey()">
                        <span class="btn-text">Tạo Key</span>
                    </button>
                    <p class="error-text hidden" id="errorMsg"></p>
                </div>

                <!-- Khu vực hiển thị key -->
                <div id="keySection" class="hidden">
                    <div class="page-title">Your Key</div>
                    <div class="page-subtitle">Active & Valid</div>
                    <div class="key-box">
                        <div class="key-label">Key</div>
                        <div class="key-value" id="keyDisplay"></div>
                    </div>
                    <p class="expiry-text" id="expiryText">Key expires in 5 minutes</p>
                    <div class="countdown-timer" id="countdown"></div>
                    <button class="btn-get-key" onclick="getNewKey()">
                        <span class="btn-text">Get New Key</span>
                    </button>
                </div>

                <!-- Đã có key - không cho tạo mới -->
                <div id="waitSection" class="hidden">
                    <div class="page-title">Already Generated</div>
                    <div class="page-subtitle">You have an active key</div>
                    <div class="key-box">
                        <div class="key-label">Your Key</div>
                        <div class="key-value" id="waitKeyDisplay"></div>
                    </div>
                    <p class="expiry-text">Hết hạn sau:</p>
                    <div class="countdown-timer" id="waitCountdown"></div>
                    <p class="error-text">Thiết bị này đã tạo key! Không thể tạo key mới cho đến khi key cũ hết hạn.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIG =====
        const API_URL = 'https://script.google.com/macros/s/AKfycbxTAnKVDFLYDbpzsFk5eQZizdwhdSC7lGcydZE1dra1bywjmG9QZmyKRd02wHOVy5mi/exec';
        const HOME_URL = 'https://getkeyapexhub.vercel.app/';
        const BASE_URL = 'https://getkeyapexhub.vercel.app/key.html';
        const EXPIRY_MINUTES = 5;
        const EXPIRY_TEXT = '5 minutes';
        const STORAGE_KEY = 'apexhub_main_key';
        const FINGERPRINT_KEY = 'apexhub_device_fp';
        // ==================

        // ===== DEVICE FINGERPRINT (KHÔNG THỂ XÓA) =====
        function generateFingerprint() {
            const components = [];
            
            // Canvas fingerprint
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const txt = 'APEX_HUB_SECURE_FP';
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText(txt, 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillText(txt, 4, 17);
                components.push(canvas.toDataURL());
            } catch(e) {}
            
            // WebGL fingerprint
            try {
                const glCanvas = document.createElement('canvas');
                const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
                if(gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if(debugInfo) {
                        components.push(gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL));
                        components.push(gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL));
                    }
                }
            } catch(e) {}
            
            // Audio fingerprint
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if(AudioContext) {
                    const audioCtx = new AudioContext();
                    const oscillator = audioCtx.createOscillator();
                    const analyser = audioCtx.createAnalyser();
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0;
                    oscillator.connect(analyser);
                    analyser.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    components.push(oscillator.type);
                    components.push(analyser.fftSize.toString());
                    components.push(audioCtx.sampleRate.toString());
                    oscillator.disconnect();
                    analyser.disconnect();
                    gainNode.disconnect();
                    audioCtx.close();
                }
            } catch(e) {}
            
            // Browser info
            components.push(navigator.userAgent);
            components.push(navigator.language);
            components.push(navigator.platform || '');
            components.push(screen.colorDepth.toString());
            components.push(screen.width + 'x' + screen.height);
            components.push(screen.availWidth + 'x' + screen.availHeight);
            components.push(new Date().getTimezoneOffset().toString());
            components.push(navigator.hardwareConcurrency || '');
            components.push(navigator.deviceMemory || '');
            
            // Plugins
            try {
                const plugins = [];
                for(let i = 0; i < navigator.plugins.length; i++) {
                    plugins.push(navigator.plugins[i].name);
                }
                components.push(plugins.join(','));
            } catch(e) {}
            
            const fingerprint = components.join('###');
            
            // Hash
            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                const char = fingerprint.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            return 'APEX_' + Math.abs(hash).toString(36);
        }

        function getOrCreateFingerprint() {
            // Kiểm tra cookie (khó xóa nhất)
            try {
                const cookies = document.cookie.split(';');
                for(let i = 0; i < cookies.length; i++) {
                    const c = cookies[i].trim();
                    if(c.startsWith(FINGERPRINT_KEY + '=')) {
                        return c.substring(FINGERPRINT_KEY.length + 1);
                    }
                }
            } catch(e) {}
            
            // Kiểm tra localStorage
            try {
                const fp = localStorage.getItem(FINGERPRINT_KEY);
                if(fp) return fp;
            } catch(e) {}
            
            // Kiểm tra sessionStorage
            try {
                const fp = sessionStorage.getItem(FINGERPRINT_KEY);
                if(fp) return fp;
            } catch(e) {}
            
            // Tạo mới và lưu vào NHIỀU NƠI
            const newFp = generateFingerprint();
            
            try {
                // Cookie - 1 năm, không thể xóa dễ dàng
                document.cookie = FINGERPRINT_KEY + '=' + newFp + ';path=/;max-age=31536000;SameSite=Lax';
                // localStorage
                localStorage.setItem(FINGERPRINT_KEY, newFp);
                // sessionStorage
                sessionStorage.setItem(FINGERPRINT_KEY, newFp);
            } catch(e) {}
            
            return newFp;
        }

        // ===== GỌI API GOOGLE SHEETS =====
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                return 'unknown-ip';
            }
        }

        async function checkDeviceOnServer(deviceId) {
            try {
                const ip = await getIP();
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 8000);
                
                const response = await fetch(
                    API_URL + '?action=check&device=' + encodeURIComponent(deviceId) + '&ip=' + encodeURIComponent(ip),
                    { signal: controller.signal }
                );
                
                clearTimeout(timeout);
                const data = await response.json();
                return data;
            } catch(e) {
                console.error('Check error:', e);
                return { allowed: true }; // Nếu lỗi API thì cho phép tạo key
            }
        }

        async function saveKeyToServer(deviceId, key, expiry) {
            try {
                const ip = await getIP();
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 8000);
                
                await fetch(
                    API_URL + '?action=save&device=' + encodeURIComponent(deviceId) + 
                    '&key=' + encodeURIComponent(key) + 
                    '&expiry=' + encodeURIComponent(expiry) +
                    '&ip=' + encodeURIComponent(ip),
                    { signal: controller.signal }
                );
                
                clearTimeout(timeout);
            } catch(e) {
                console.error('Save error:', e);
            }
        }

        // ===== HELPER FUNCTIONS =====
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#e63946', '#ff4d4d', '#cc2936', '#ff6666', '#b32430'];
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 6 + 5) + 's';
                particle.style.boxShadow = `0 0 ${size * 3}px ${colors[Math.floor(Math.random() * colors.length)]}`;
                container.appendChild(particle);
            }
        }

        function generateToken() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let token = '';
            for (let i = 0; i < 32; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }

        function generateRandomString(length) {
            const chars = 'qptoeugjwmxnalkjf¡¿\'-:;₫&@9275023#%*^+€¥$_|\\[]{}bcz';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function generateKey() {
            const randomPart = generateRandomString(15);
            const positions = ['start', 'middle', 'end'];
            const apexPosition = positions[Math.floor(Math.random() * positions.length)];
            
            let key;
            switch(apexPosition) {
                case 'start':
                    key = `Free_apex${randomPart}`;
                    break;
                case 'middle':
                    const mid = Math.floor(randomPart.length / 2);
                    key = `Free_${randomPart.slice(0, mid)}apex${randomPart.slice(mid)}`;
                    break;
                case 'end':
                    key = `Free_${randomPart}apex`;
                    break;
            }
            return key;
        }

        // ===== LƯU TRỮ LOCAL =====
        function getMainData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    const currentFp = getOrCreateFingerprint();
                    
                    // Kiểm tra fingerprint
                    if (data.fingerprint !== currentFp) {
                        localStorage.removeItem(STORAGE_KEY);
                        return null;
                    }
                    
                    // Kiểm tra hết hạn
                    if (new Date().getTime() < data.expiry) {
                        return data;
                    } else {
                        localStorage.removeItem(STORAGE_KEY);
                    }
                } catch(e) {
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
            return null;
        }

        function saveMainData(key, token, expiryISO) {
            const expiry = new Date(expiryISO).getTime();
            const fingerprint = getOrCreateFingerprint();
            
            const data = {
                key: key,
                token: token,
                expiry: expiry,
                fingerprint: fingerprint,
                saved: new Date().getTime()
            };
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            return data;
        }

        function getTokenFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('token');
        }

        // ===== COUNTDOWN =====
        let countdownInterval;
        let waitCountdownInterval;

        function startCountdown(expiryTime, elementId) {
            const countdownEl = document.getElementById(elementId);
            
            const interval = setInterval(() => {
                const distance = expiryTime - new Date().getTime();
                
                if (distance <= 0) {
                    clearInterval(interval);
                    countdownEl.textContent = 'KEY EXPIRED - Redirecting...';
                    countdownEl.classList.add('expired');
                    localStorage.removeItem(STORAGE_KEY);
                    
                    setTimeout(() => {
                        redirectToHome();
                    }, 2000);
                    return;
                }
                
                const h = Math.floor(distance / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);
                
                if (h > 0) {
                    countdownEl.textContent = `${h}h ${m}m ${s}s`;
                } else if (m > 0) {
                    countdownEl.textContent = `${m}m ${s}s`;
                } else {
                    countdownEl.textContent = `${s}s`;
                }
                
                if (distance < 60000) {
                    countdownEl.style.color = '#ff3333';
                }
            }, 1000);
            
            return interval;
        }

        // ===== MAIN FUNCTIONS =====
        async function generateAndShowKey() {
            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;
            btn.querySelector('.btn-text').textContent = 'Đang tạo...';
            
            const deviceId = getOrCreateFingerprint();
            
            // Kiểm tra server trước
            const serverCheck = await checkDeviceOnServer(deviceId);
            
            if (!serverCheck.allowed) {
                // Server nói đã có key -> hiển thị wait
                const existingData = {
                    key: serverCheck.key,
                    expiry: new Date(serverCheck.expiry).getTime(),
                    token: generateToken(),
                    fingerprint: deviceId
                };
                saveMainData(serverCheck.key, existingData.token, serverCheck.expiry);
                showWaitSection(existingData);
                btn.disabled = false;
                btn.querySelector('.btn-text').textContent = 'Tạo Key';
                return;
            }
            
            // Tạo key mới
            const token = generateToken();
            const key = generateKey();
            const now = new Date();
            const expiry = new Date(now.getTime() + EXPIRY_MINUTES * 60 * 1000);
            const expiryISO = expiry.toISOString();
            
            // Lưu lên server
            await saveKeyToServer(deviceId, key, expiryISO);
            
            // Lưu local
            const data = saveMainData(key, token, expiryISO);
            
            // Cập nhật URL
            const newURL = BASE_URL + '?token=' + token;
            window.history.pushState({ token: token }, '', newURL);
            
            // Hiển thị key
            showKeySection(data);
            
            btn.disabled = false;
            btn.querySelector('.btn-text').textContent = 'Tạo Key';
        }

        function showKeySection(data) {
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('generateSection').classList.add('hidden');
            document.getElementById('waitSection').classList.add('hidden');
            document.getElementById('keySection').classList.remove('hidden');
            
            document.getElementById('keyDisplay').textContent = data.key;
            document.getElementById('expiryText').textContent = 'Key expires in ' + EXPIRY_TEXT;
            
            if (countdownInterval) clearInterval(countdownInterval);
            if (waitCountdownInterval) clearInterval(waitCountdownInterval);
            countdownInterval = startCountdown(data.expiry, 'countdown');
        }

        function showGenerateSection() {
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('keySection').classList.add('hidden');
            document.getElementById('waitSection').classList.add('hidden');
            document.getElementById('generateSection').classList.remove('hidden');
        }

        function showWaitSection(data) {
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('keySection').classList.add('hidden');
            document.getElementById('generateSection').classList.add('hidden');
            document.getElementById('waitSection').classList.remove('hidden');
            
            document.getElementById('waitKeyDisplay').textContent = data.key;
            
            if (countdownInterval) clearInterval(countdownInterval);
            if (waitCountdownInterval) clearInterval(waitCountdownInterval);
            waitCountdownInterval = startCountdown(data.expiry, 'waitCountdown');
        }

        function redirectToHome() {
            window.location.href = HOME_URL;
        }

        function getNewKey() {
            localStorage.removeItem(STORAGE_KEY);
            if (countdownInterval) clearInterval(countdownInterval);
            if (waitCountdownInterval) clearInterval(waitCountdownInterval);
            redirectToHome();
        }

        // ===== KHỞI TẠO =====
        async function init() {
            // Kiểm tra local trước
            const mainData = getMainData();
            
            if (mainData) {
                // CÓ KEY LOCAL -> kiểm tra lại với server
                const deviceId = getOrCreateFingerprint();
                const serverCheck = await checkDeviceOnServer(deviceId);
                
                if (!serverCheck.allowed) {
                    // Server confirm có key -> hiển thị
                    if (serverCheck.key === mainData.key) {
                        // Key khớp
                        const updatedData = {
                            ...mainData,
                            expiry: new Date(serverCheck.expiry).getTime()
                        };
                        saveMainData(serverCheck.key, mainData.token, serverCheck.expiry);
                        showKeySection(updatedData);
                    } else {
                        // Key khác -> dùng key từ server
                        const newData = saveMainData(serverCheck.key, generateToken(), serverCheck.expiry);
                        showWaitSection(newData);
                    }
                } else {
                    // Server nói hết hạn nhưng local còn -> dùng local
                    showKeySection(mainData);
                }
                
                // Đảm bảo URL có token
                const urlToken = getTokenFromURL();
                if (!urlToken || urlToken !== mainData.token) {
                    const newURL = BASE_URL + '?token=' + mainData.token;
                    window.history.pushState({ token: mainData.token }, '', newURL);
                }
            } else {
                // KHÔNG CÓ KEY LOCAL -> kiểm tra server
                const deviceId = getOrCreateFingerprint();
                const serverCheck = await checkDeviceOnServer(deviceId);
                
                if (!serverCheck.allowed) {
                    // Server có key -> lưu local và hiển thị wait
                    const data = saveMainData(serverCheck.key, generateToken(), serverCheck.expiry);
                    showWaitSection(data);
                } else {
                    // Không có key -> cho phép tạo
                    showGenerateSection();
                }
            }
        }

        // Kiểm tra định kỳ - chống xóa localStorage
        setInterval(() => {
            const mainData = getMainData();
            const keySection = document.getElementById('keySection');
            const waitSection = document.getElementById('waitSection');
            const isKeyVisible = !keySection.classList.contains('hidden');
            const isWaitVisible = !waitSection.classList.contains('hidden');
            
            if (mainData && !isKeyVisible && !isWaitVisible) {
                // Key tồn tại nhưng không hiển thị -> ép hiển thị
                showKeySection(mainData);
                const newURL = BASE_URL + '?token=' + mainData.token;
                window.history.pushState({ token: mainData.token }, '', newURL);
            }
            
            if (!mainData && (isKeyVisible || isWaitVisible)) {
                // Key hết hạn -> chuyển về home
                redirectToHome();
            }
        }, 3000);

        // Bảo vệ URL - nếu ai đó xóa token thì tự động thêm lại
        window.addEventListener('popstate', function() {
            const mainData = getMainData();
            const urlToken = getTokenFromURL();
            
            if (mainData && (!urlToken || urlToken !== mainData.token)) {
                const newURL = BASE_URL + '?token=' + mainData.token;
                window.history.pushState({ token: mainData.token }, '', newURL);
                showKeySection(mainData);
            }
        });

        createParticles();
        init();
    </script>
</body>
</html>
