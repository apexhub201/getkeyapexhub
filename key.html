<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX HUB | Your Key</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Montserrat',sans-serif;background:#050505;
            min-height:100vh;display:flex;justify-content:center;align-items:center;
            overflow:hidden;position:relative;
        }
        .bg-gradient{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:radial-gradient(ellipse at 20% 50%,rgba(180,0,0,.15) 0%,transparent 50%),
                      radial-gradient(ellipse at 80% 50%,rgba(0,0,0,.3) 0%,transparent 50%),
                      radial-gradient(ellipse at 50% 0%,rgba(255,50,50,.08) 0%,transparent 50%),
                      radial-gradient(ellipse at 50% 100%,rgba(180,0,0,.1) 0%,transparent 50%);
            z-index:0;
        }
        .grid-pattern{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
                           linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
            background-size:60px 60px;z-index:0;animation:gridMove 20s linear infinite;
        }
        @keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
        .particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
        .particle{position:absolute;border-radius:50%;animation:floatUp 8s infinite ease-in;opacity:0}
        @keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px) scale(1);opacity:0}}
        .container{position:relative;z-index:2;width:100%;max-width:520px;padding:20px}
        .card{
            background:rgba(10,10,10,.9);backdrop-filter:blur(30px);
            -webkit-backdrop-filter:blur(30px);
            border:1px solid rgba(230,57,70,.2);border-radius:24px;
            padding:50px 40px;text-align:center;
            box-shadow:0 0 80px rgba(220,20,20,.08),0 30px 60px rgba(0,0,0,.6);
            position:relative;overflow:hidden;transition:all .4s;
        }
        .card::before{
            content:'';position:absolute;top:-100%;left:-100%;width:300%;height:300%;
            background:conic-gradient(from 0deg,transparent,rgba(220,20,20,.05),transparent,rgba(255,80,80,.08),transparent);
            animation:rotateGlow 15s linear infinite;z-index:0;
        }
        @keyframes rotateGlow{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .card-content{position:relative;z-index:1}
        .logo-text{
            font-size:48px;font-weight:700;letter-spacing:6px;color:#fff;
            margin-bottom:5px;animation:fadeInUp .8s ease-out;
            text-shadow:0 0 40px rgba(255,50,50,.3);
        }
        .logo-text span{color:#e63946;text-shadow:0 0 60px rgba(230,57,70,.6)}
        .logo-subtitle{
            font-size:13px;color:rgba(255,255,255,.5);letter-spacing:8px;
            text-transform:uppercase;margin-bottom:40px;
            animation:fadeInUp .8s ease-out .15s both;
        }
        .divider{
            width:80px;height:2px;background:linear-gradient(90deg,transparent,#e63946,transparent);
            margin:0 auto 35px;animation:fadeInUp .8s ease-out .3s both;
        }
        .page-title{
            font-size:22px;color:#ccc;letter-spacing:4px;text-transform:uppercase;
            margin-bottom:8px;animation:fadeInUp .8s ease-out .35s both;
        }
        .page-subtitle{
            font-size:11px;color:rgba(255,255,255,.35);letter-spacing:3px;
            margin-bottom:40px;animation:fadeInUp .8s ease-out .4s both;
        }
        @keyframes fadeInUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
        .key-box{
            margin-top:35px;padding:22px 20px;background:rgba(0,0,0,.6);
            border:1px solid rgba(230,57,70,.25);border-radius:16px;
            animation:fadeInUp .8s ease-out .4s both;
        }
        .key-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
        .key-value{
            font-family:'Courier New',monospace;font-size:13px;color:#e63946;
            word-break:break-all;letter-spacing:1px;
            text-shadow:0 0 20px rgba(230,57,70,.4);
        }
        .expiry-text{margin-top:15px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px}
        .countdown-timer{
            margin-top:8px;margin-bottom:30px;font-size:14px;font-weight:500;
            color:#e63946;letter-spacing:2px;text-shadow:0 0 15px rgba(230,57,70,.5);
        }
        .countdown-timer.expired{color:#f33;animation:blink .8s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
        .btn{
            display:inline-block;padding:16px 55px;font-size:15px;font-weight:500;
            letter-spacing:4px;text-transform:uppercase;color:#fff;
            background:linear-gradient(135deg,#1a0000,#2d0000,#1a0000);
            border:1px solid rgba(230,57,70,.5);border-radius:50px;cursor:pointer;
            overflow:hidden;transition:all .5s;position:relative;z-index:1;
            animation:fadeInUp .8s ease-out .6s both;
        }
        .btn::before{
            content:'';position:absolute;top:50%;left:50%;width:0;height:0;
            border-radius:50%;background:rgba(230,57,70,.25);
            transform:translate(-50%,-50%);transition:width .7s,height .7s;
        }
        .btn:hover::before{width:400px;height:400px}
        .btn:hover{
            border-color:#e63946;box-shadow:0 0 30px rgba(230,57,70,.3);
            transform:translateY(-3px);letter-spacing:6px;
        }
        .btn:disabled{opacity:.5;pointer-events:none}
        .btn-text{position:relative;z-index:1}
        .hidden{display:none!important}
        .error-text{color:#f44;font-size:14px;letter-spacing:2px;margin-top:20px}
        .loading-spinner{
            display:inline-block;width:20px;height:20px;border:2px solid rgba(230,57,70,.3);
            border-top:2px solid #e63946;border-radius:50%;animation:spin .8s linear infinite;
            margin-right:10px;vertical-align:middle;
        }
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="grid-pattern"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card">
            <div class="card-content">
                <div class="logo-text">APEX <span>HUB</span></div>
                <div class="logo-subtitle">Premium Access</div>
                <div class="divider"></div>

                <!-- LOADING -->
                <div id="loadingSection">
                    <div class="page-title"><span class="loading-spinner"></span>Checking...</div>
                    <div class="page-subtitle">Vui lòng đợi</div>
                </div>

                <!-- TẠO KEY -->
                <div id="generateSection" class="hidden">
                    <div class="page-title">Tạo Key</div>
                    <div class="page-subtitle">Nhấn nút để tạo key mới</div>
                    <button class="btn" id="btnGenerate" onclick="taoKey()">
                        <span class="btn-text">Tạo Key</span>
                    </button>
                    <p class="error-text hidden" id="errorMsg"></p>
                </div>

                <!-- HIỂN THỊ KEY -->
                <div id="keySection" class="hidden">
                    <div class="page-title">Key Của Bạn</div>
                    <div class="page-subtitle">Đang hoạt động</div>
                    <div class="key-box">
                        <div class="key-label">Key</div>
                        <div class="key-value" id="keyDisplay"></div>
                    </div>
                    <p class="expiry-text">Key hết hạn sau:</p>
                    <div class="countdown-timer" id="countdown"></div>
                    <button class="btn" onclick="getNewKey()">
                        <span class="btn-text">Lấy Key Mới</span>
                    </button>
                </div>

                <!-- CHẶN - ĐÃ CÓ KEY -->
                <div id="blockedSection" class="hidden">
                    <div class="page-title">Đã Có Key</div>
                    <div class="page-subtitle">Mỗi IP chỉ được 1 key</div>
                    <div class="key-box">
                        <div class="key-label">Key của bạn</div>
                        <div class="key-value" id="blockedKeyDisplay"></div>
                    </div>
                    <p class="expiry-text">Hết hạn sau:</p>
                    <div class="countdown-timer" id="blockedCountdown"></div>
                    <p class="error-text">IP này đã tạo key! Vui lòng đợi key cũ hết hạn.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIG =====
        // Link API Google Apps Script MỚI CỦA BẠN ĐÃ ĐƯỢC CẬP NHẬT TẠI ĐÂY
        const API_URL = 'https://script.google.com/macros/s/AKfycbzYQmvDkjlQPn743Dbf6xZOXc9v_ffysY3PSla39q4gaK26jx766DwYcjJHQhVBsi0F/exec';
        
        const HOME_URL = 'https://getkeyapexhub.vercel.app/';
        const BASE_URL = 'https://getkeyapexhub.vercel.app/key.html';
        const PHUT = 5;
        // ==================

        let countdownTimer = null;

        // ===== PARTICLES =====
        function taoHat(){
            var c=document.getElementById('particles');
            var cl=['#e63946','#ff4d4d','#cc2936','#ff6666'];
            for(var i=0;i<25;i++){
                var p=document.createElement('div');
                p.className='particle';
                var s=Math.random()*3+1;
                p.style.cssText='width:'+s+'px;height:'+s+'px;left:'+Math.random()*100+'%;background:'+cl[Math.floor(Math.random()*4)]+';animation-delay:'+Math.random()*8+'s;animation-duration:'+(Math.random()*6+5)+'s';
                c.appendChild(p);
            }
        }

        // ===== LẤY IP =====
        async function layIP(){
            try{
                var r=await fetch('https://api.ipify.org?format=json');
                var d=await r.json();
                return d.ip;
            }catch(e){return 'khong-co-ip';}
        }

        // ===== ĐỌC TOKEN TỪ URL =====
        function layTokenURL() {
            return new URLSearchParams(window.location.search).get("token");
        }

        // ===== KIỂM TRA SERVER THEO IP =====
        async function kiemTraServer(){
            try{
                var ip=await layIP();
                var controller=new AbortController();
                var timeout=setTimeout(function(){controller.abort();},8000);
                var r=await fetch(API_URL+'?action=check&ip='+encodeURIComponent(ip),{signal:controller.signal});
                clearTimeout(timeout);
                return await r.json();
            }catch(e){
                return {allowed: true};
            }
        }

        // ===== LƯU KEY LÊN SERVER =====
        async function luuKeyServer(key,expiry){
            try{
                var ip=await layIP();
                var token=taoToken();
                await fetch(API_URL+'?action=save&ip='+encodeURIComponent(ip)+'&token='+token+'&key='+encodeURIComponent(key)+'&expiry='+encodeURIComponent(expiry));
                return token;
            }catch(e){return '';}
        }

        // ===== TẠO TOKEN NGẪU NHIÊN =====
        function taoToken(){
            var c='abcdefghijklmnopqrstuvwxyz0123456789';
            var t='';
            for(var i=0;i<32;i++) t+=c.charAt(Math.floor(Math.random()*c.length));
            return t;
        }

        // ===== TẠO CHUỖI KEY =====
        function taoChuoi(){
            var c="qptoeugjwmxnalkjf0123456789bcz-_@#%^*"; 
            var r='';
            for(var i=0;i<15;i++) r+=c[Math.floor(Math.random()*c.length)];
            var p=['dau','giua','cuoi'][Math.floor(Math.random()*3)];
            if(p==='dau') return 'Free_apex'+r;
            if(p==='cuoi') return 'Free'+r+'apex';
            var m=Math.floor(r.length/2);
            return 'Free_'+r.slice(0,m)+'apex'+r.slice(m);
        }

        // ===== ĐẾM NGƯỢC HẾT HẠN =====
        function demNguoc(expiryStr,elId){
            if(countdownTimer) clearInterval(countdownTimer);
            var el=document.getElementById(elId);
            countdownTimer=setInterval(function(){
                var d=new Date(expiryStr).getTime()-Date.now();
                if(d<=0){
                    clearInterval(countdownTimer);
                    el.textContent='HẾT HẠN';
                    el.classList.add('expired');
                    localStorage.removeItem('apex_key_data');
                    setTimeout(function(){window.location.href=HOME_URL;},2000);
                    return;
                }
                var m=Math.floor(d/60000);
                var s=Math.floor((d%60000)/1000);
                el.textContent=m+'m '+s+'s';
                if(d<60000) el.style.color='#f33';
            },1000);
        }

        // ===== QUẢN LÝ LOCALSTORAGE =====
        function luuLocal(key,token,expiry){
            var data={key,token,expiry};
            localStorage.setItem('apex_key_data',JSON.stringify(data));
        }

        function layLocal(){
            var d=localStorage.getItem('apex_key_data');
            if(d){
                try{
                    var data=JSON.parse(d);
                    if(new Date(data.expiry).getTime()>Date.now()) return data;
                }catch(e){}
            }
            return null;
        }

        // ===== CHUYỂN ĐỔI GIAO DIỆN =====
        function hien(id){
            ['loadingSection','generateSection','keySection','blockedSection'].forEach(function(x){
                document.getElementById(x).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function hienKey(key,expiry){
            hien('keySection');
            document.getElementById('keyDisplay').textContent=key;
            demNguoc(expiry,'countdown');
        }

        function hienBlocked(key,expiry){
            hien('blockedSection');
            document.getElementById('blockedKeyDisplay').textContent=key;
            demNguoc(expiry,'blockedCountdown');
        }

        function getNewKey(){
            localStorage.removeItem('apex_key_data');
            if(countdownTimer) clearInterval(countdownTimer);
            window.location.href=HOME_URL;
        }

        // ===== HÀM TẠO KEY CHÍNH =====
        async function taoKey(){
            var btn=document.getElementById('btnGenerate');
            btn.disabled=true;
            btn.querySelector('.btn-text').textContent='Đang kiểm tra...';

            var kq=await kiemTraServer();

            if(!kq.allowed){
                luuLocal(kq.key,taoToken(),kq.expiry);
                hienBlocked(kq.key,kq.expiry);
                btn.disabled=false;
                btn.querySelector('.btn-text').textContent='Tạo Key';
                return;
            }

            var key=taoChuoi();
            var now=new Date();
            var expiry=new Date(now.getTime()+PHUT*60000);
            var expiryISO=expiry.toISOString();

            var token=await luuKeyServer(key,expiryISO);
            luuLocal(key,token,expiryISO);

            var newURL=BASE_URL+'?token='+token;
            window.history.replaceState({token: token},'',newURL);

            hienKey(key,expiryISO);

            btn.disabled=false;
            btn.querySelector('.btn-text').textContent='Tạo Key';
        }

        // ===== KHỞI TẠO TRANG (INIT) =====
        async function init(){
            var tokenURL = layTokenURL();

            // Bước 1: Nếu có token trên URL, gọi Server xác thực token này trước
            if(tokenURL){
                try{
                    var r = await fetch(API_URL + "?action=get&token=" + encodeURIComponent(tokenURL));
                    var d = await r.json();
                    if(d.success){
                        // Token hợp lệ -> Cập nhật Local và hiển thị Key thành công
                        luuLocal(d.key, tokenURL, d.expiry);
                        hienKey(d.key, d.expiry);
                        return;
                    }
                }catch(e){
                    console.log("Lỗi đồng bộ token URL");
                }
            }

            // Bước 2: Nếu không có token URL hợp lệ, kiểm tra tới Local Storage
            var localData=layLocal();
            if(localData){
                var newURL=BASE_URL+'?token='+localData.token;
                window.history.replaceState({token: localData.token},'',newURL);
                hienKey(localData.key,localData.expiry);
                return;
            }

            // Bước 3: Nếu cả 2 đều không có dữ liệu, check IP hệ thống để quyết định cho tạo hay block
            var kq=await kiemTraServer();

            if(!kq.allowed){
                luuLocal(kq.key,taoToken(),kq.expiry);
                hienBlocked(kq.key,kq.expiry);
            }else{
                hien('generateSection');
            }
        }

        // Vòng lặp kiểm tra mỗi 3 giây - chống xóa tham số token trên URL hoặc lỗi UI đột ngột
        setInterval(function(){
            var localData=layLocal();
            var keySection=document.getElementById('keySection');
            var blockedSection=document.getElementById('blockedSection');

            if(localData){
                // Nếu đang hiển thị giao diện có key nhưng URL bị mất token -> Ghi đè lại URL ngay lập tức
                var hienTaiToken = layTokenURL();
                if(!hienTaiToken || hienTaiToken !== localData.token){
                    var newURL = BASE_URL + '?token=' + localData.token;
                    window.history.replaceState({token: localData.token}, '', newURL);
                }

                if(keySection.classList.contains('hidden') && blockedSection.classList.contains('hidden')){
                    hienKey(localData.key,localData.expiry);
                }
            }
        },3000);

        taoHat();
        init();
    </script>
</body>
</html>
